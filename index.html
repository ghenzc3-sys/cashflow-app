<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cashflow</title>
<style>
:root{--biru:#2563eb;--biru-tua:#1e40af;--hijau:#10b981}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--biru) 0%, var(--biru-tua) 100%);min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:32px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.logo{font-size:48px;margin-bottom:8px}
h1{color:var(--biru);font-size:28px;font-weight:900;margin:0 0 24px}
.label{font-size:14px;color:#6b7280;font-weight:700;margin-bottom:8px}
.saldo-wrap{display:flex;gap:12px;align-items:center;margin-bottom:24px}
.saldo{flex:1;background:var(--abu,#f3f4f6);border:3px solid var(--biru);border-radius:20px;padding:20px;font-size:28px;font-weight:900;color:var(--biru);letter-spacing:.5px}
.btn-mata{width:56px;height:56px;border:none;border-radius:20px;background:var(--biru);color:#fff;font-size:24px;cursor:pointer;transition:.2s}
.btn-mata:active{transform:scale(.95)}
.input-area{display:flex;gap:10px;margin-bottom:8px}
#inp{flex:1;border:3px solid var(--biru);border-radius:16px;padding:16px;font-size:17px;font-weight:600;outline:none;transition:.2s}
#inp:focus{border-color:var(--hijau);box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.btn-simpan{border:none;border-radius:16px;background:var(--biru);color:#fff;font-weight:800;font-size:16px;padding:0 20px;cursor:pointer;transition:.2s}
.btn-simpan:active{transform:scale(.95);background:var(--biru-tua)}
.hint{font-size:11px;color:#9ca3af;font-weight:600;margin-bottom:20px}
.btn-detail{display:block;width:100%;border:none;border-radius:16px;background:var(--hijau);color:#fff;font-weight:800;font-size:16px;padding:16px;text-decoration:none;transition:.2s}
.btn-detail:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">💸</div>
  <h1>Cashflow</h1>

  <div class="label">SALDO SAAT INI</div>
  <div class="saldo-wrap">
    <div class="saldo" id="saldoTxt">Rp *******</div>
    <button class="btn-mata" id="mata">👁️</button>
  </div>

  <div class="input-area">
    <input id="inp" placeholder="gaji 50000" autocomplete="off" inputmode="text">
    <button class="btn-simpan" id="simpan">Simpan</button>
  </div>
  <div class="hint">Contoh: hutang ali 200k | beli rokok 25k | gaji 5jt</div>

  <a href="/detail.html" class="btn-detail">Lihat Detail →</a>
</div>

<script>
const KEY='cashflow_v3';
let buka=false;
const rupiah=n=>'Rp '+Number(n||0).toLocaleString('id-ID');
const K={masuk:['gaji','upah','masuk'],keluar:['beli','bayar','keluar'],hutang:['hutang'],pinjam:['minjemin','pinjem'],balik:['kembali','bayar']};

const getSaldo=()=>getData().reduce((s,d)=>s+d.masuk+d.balik+d.hutang-d.keluar-d.pinjam,0);
const getData=()=>JSON.parse(localStorage.getItem(KEY)||'[]');
const save=d=>localStorage.setItem(KEY,JSON.stringify(d));

const refresh=()=>{
  const s=getSaldo();
  document.getElementById('saldoTxt').innerText=buka?rupiah(s):'Rp *******';
  document.getElementById('mata').innerText=buka?'🙈':'👁️';
}
document.getElementById('mata').onclick=()=>{buka=!buka;refresh()};

const parse=t=>{
  t=t.toLowerCase().trim();
  const n=Number((t.match(/(\d[\d\.]*)(k|jt)?/)||[0,'0'])[1].replace(/\./g,''))*(t.includes('jt')?1000000:t.includes('k')?1000:1)||0;
  if(n<=0)return null;
  let type='masuk';for(let k in K){if(K[k].some(w=>t.includes(w))){type=k;break}}
  const nama=t.replace(new RegExp(K[type].join('|'),'g'),'').replace(/[\d\.kjt]+/g,'').trim()||'-';
  return{type,nama,num:n};
}

document.getElementById('simpan').onclick=()=>{
  const r=parse(document.getElementById('inp').value);
  if(!r)return alert('Format: keyword nama angka\nEx: gaji 5jt');
  const d=getData();const i={t:new Date().toLocaleDateString('id-ID'),n:r.nama,m:0,k:0,h:0,p:0,b:0,it:r.type};
  if(r.type==='masuk')i.m=r.num;if(r.type==='keluar')i.k=r.num;if(r.type==='hutang')i.h=r.num;if(r.type==='pinjam')i.p=r.num;if(r.type==='balik')i.b=r.num;
  d.push(i);save(d);document.getElementById('inp').value='';if(buka)refresh();
  navigator.vibrate?.(50); // getar dikit di HP biar kerasa
}
document.getElementById('inp').onkeypress=e=>{if(e.key==='Enter')document.getElementById('simpan').click()};
refresh();
</script>
</body>
</html><!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow</title>
<style>
*{box-sizing:border-box}
body{font-family:Segoe UI,Arial;background:#eef2ff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:16px}
.box{background:#fff;padding:40px 36px;border-radius:24px;box-shadow:0 12px 32px rgba(0,0,0,.12);width:100%;max-width:480px;text-align:center}
h1{color:#1d4ed8;font-size:32px;margin:0 0 12px;font-weight:800}
.emoji{font-size:60px;margin-bottom:10px}
.label-saldo{font-weight:800;font-size:18px;color:#1d4ed8;margin-bottom:8px;display:block}
.saldo-wrap{display:flex;gap:10px;margin:12px 0 20px}
.saldo-box{flex:1;border:2px solid #2563eb;border-radius:14px;padding:16px;font-size:22px;font-weight:800;color:#2563eb;text-align:center}
.btn-icon{width:52px;border:none;border-radius:14px;background:#2563eb;color:#fff;font-size:24px;cursor:pointer}
.input-wrap{display:flex;gap:10px;margin-bottom:10px}
#inputData{flex:1;border:2px solid #2563eb;border-radius:14px;padding:14px;font-size:16px}
.btn{background:#2563eb;color:#fff;border:none;border-radius:14px;padding:14px 20px;font-weight:700;cursor:pointer;font-size:15px;text-decoration:none;display:block}
.btn-hijau{background:#10b981;width:100%;margin-top:16px;font-size:17px;padding:16px}
.keyword{font-size:12px;color:#6b7280;margin-top:8px;font-weight:600}
</style>
</head>
<body>
  <div class="box">
    <h1>Cashflow</h1>
    <div class="emoji">😺</div>
    <label class="label-saldo">Saldo</label>
    <div class="saldo-wrap">
      <div class="saldo-box" id="saldoText">Rp *******</div>
      <button class="btn-icon" id="btnMata">👁️</button>
    </div>
    <div class="input-wrap">
      <input id="inputData" placeholder="Contoh: gaji 50000">
      <button class="btn" id="btnSimpan">Simpan</button>
    </div>
    <div class="keyword">Format: keyword nama angka. Ex: hutang pak likin 500000</div>
    <a href="/detail.html" class="btn btn-hijau">Detail</a> <!-- UDAH DIKASIH / -->
  </div>

<script>
const KEY = 'cashflow_data_v1';
let buka = false;
const rupiah = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
const KEYWORDS = ['dikembalikan', 'pengembalian', 'minjemin', 'pinjemin', 'hutang', 'beli', 'bayar', 'gaji', 'upah', 'kembali'];

function getSaldo() {
  const data = JSON.parse(localStorage.getItem(KEY) || '[]');
  return data.reduce((s,d) => s + (d.masuk||0) + (d.pengembalian||0) + (d.hutang||0) - (d.keluar||0) - (d.minjemin||0) - (d.dikembalikan||0), 0);
}

function refreshSaldo() {
  const s = getSaldo();
  document.getElementById('saldoText').innerText = buka? rupiah(s) : 'Rp *******';
  document.getElementById('btnMata').innerText = buka? '🙈' : '👁️';
}

document.getElementById('btnMata').onclick = () => { buka =!buka; refreshSaldo(); };

document.getElementById('btnSimpan').onclick = () => {
  const txt = document.getElementById('inputData').value.toLowerCase().trim();
  if(!txt) return alert('Isi dulu bang');

  const keyword = KEYWORDS.find(k => txt.includes(k));
  if (!keyword) return alert('Gagal Simpan!\n\nWajib pake keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali, dikembalikan\nContoh: hutang pak likin 500000');

  const num = Number((txt.match(/(\d[\d\.]*)/)||[0,'0'])[1].replace(/\./g,'')) || 0;
  if(num<=0) return alert('Kasih angka. Ex: hutang pak likin 500000');

  let j='masuk';
  if(keyword==='beli'||keyword==='bayar') j='keluar';
  else if(keyword==='dikembalikan'||keyword==='kembali') j='dikembalikan';
  else if(keyword==='pengembalian') j='pengembalian';
  else if(keyword==='hutang') j='hutang';
  else if(keyword==='minjemin'||keyword==='pinjemin') j='minjemin';
  else if(keyword==='gaji'||keyword==='upah') j='masuk';

  const item = j;
  const nama = txt.replace(keyword, '').replace(/[\d\.]+/g,'').trim() || '-';

  const data = JSON.parse(localStorage.getItem(KEY) || '[]');
  data.push({tanggal:new Date().toISOString().split('T')[0], item, nama, masuk:j==='masuk'?num:0, keluar:j==='keluar'?num:0, hutang:j==='hutang'?num:0, minjemin:j==='minjemin'?num:0, dikembalikan:j==='dikembalikan'?num:0, pengembalian:j==='pengembalian'?num:0});
  localStorage.setItem(KEY, JSON.stringify(data));
  document.getElementById('inputData').value='';
  if(buka) refreshSaldo();
  alert('Tersimpan '+item+' - '+nama+' '+rupiah(num));
};

document.getElementById('inputData').onkeypress = e => { if(e.key==='Enter') document.getElementById('btnSimpan').click(); };
refreshSaldo();
</script>
</body>
</html>
