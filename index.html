
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cashflow</title>
<style>
:root{--biru:#0ea5e9;--biru-gelap:#2563eb;--tosca:#2dd4bf}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--biru-gelap),var(--biru));margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.2);text-align:center}
.logo{font-size:32px;margin-bottom:8px}
h1{font-size:22px;font-weight:900;color:var(--biru-gelap);margin:0 0 16px}
.label{font-size:12px;color:#6b7280;letter-spacing:1px;margin-bottom:8px}
.saldo-box{display:flex;gap:8px;align-items:center;margin-bottom:16px}
.saldo{flex:1;border:1.5px solid #e5e7eb;border-radius:16px;padding:14px;font-size:18px;font-weight:900;color:var(--biru-gelap)}
.eye{background:var(--biru);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer}
.input-wrap{display:flex;gap:8px;margin-bottom:12px}
.input{flex:1;border:1.5px solid #e5e7eb;border-radius:16px;padding:12px 14px;font-size:15px}
.input:focus{outline:none;border-color:var(--biru)}
.btn-simpan{background:var(--biru);color:#fff;border:none;border-radius:16px;padding:12px 18px;font-weight:900;cursor:pointer}
.btn-simpan:hover{opacity:.9}
.btn-detail{width:100%;background:var(--tosca);color:#fff;border:none;border-radius:16px;padding:14px;font-size:15px;font-weight:900;cursor:pointer;margin-top:4px}
.btn-detail:hover{opacity:.9}
.hint{font-size:11px;color:#9ca3af;margin-top:8px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">💵</div>
  <h1>Cashflow</h1>
  <div class="label">SALDO SAAT INI</div>
  <div class="saldo-box">
    <div class="saldo" id="saldo">Rp *******</div>
    <button class="eye" id="eye">👁️</button>
  </div>
  <form id="form">
    <div class="input-wrap">
      <input class="input" id="cat" placeholder="gaji 50000" required>
      <button class="btn-simpan">Simpan</button>
    </div>
  </form>
  <div class="hint">Contoh: gaji 50000, upah 20000, beli cilok 10000</div>
  <button class="btn-detail" onclick="location.href='/detail.html'">Lihat Detail →</button>
</div>

<script>
const KEY='cashflow_v13';
let showSaldo=false;

const autoParse=(txt)=>{
  txt=txt.toLowerCase().trim();
  const jml=Number(txt.match(/\d+/g)?.join('')||0); // ambil semua angka
  const cat=txt.replace(/\d+/g,'').trim(); // sisanya jadi catatan
  
  let ket='Keluar'; // default
  if(['gaji','upah','dapat','masuk','bonus'].some(k=>cat.includes(k))) ket='Masuk';
  if(['beli','bayar','jajan','keluar','makan','rokok','kos','bensin'].some(k=>cat.includes(k))) ket='Keluar';
  if(['dipinjam','nyaur'].some(k=>cat.includes(k))) ket='Keluar';
  if(['hutang','kembali'].some(k=>cat.includes(k))) ket='Masuk';
  
  return {ket,cat,jml};
}

const renderSaldo=()=>{
  const data=JSON.parse(localStorage.getItem(KEY)||'[]');
  const saldo=data.reduce((s,i)=>s+(i.ket==='Masuk'?i.jml:-i.jml),0);
  document.getElementById('saldo').textContent=showSaldo?`Rp ${saldo.toLocaleString('id-ID')}`:'Rp *******';
}
renderSaldo();

document.getElementById('eye').onclick=()=>{
  showSaldo=!showSaldo;
  renderSaldo();
}

document.getElementById('form').onsubmit=e=>{
  e.preventDefault();
  const txt=document.getElementById('cat').value.trim();
  if(!txt)return;
  const {ket,cat,jml}=autoParse(txt);
  if(jml===0){alert('Nominal gak ketemu bang. Contoh: gaji 50000');return}
  
  const tgl=new Date().toLocaleDateString('id-ID');
  const data=JSON.parse(localStorage.getItem(KEY)||'[]');
  data.push({t:tgl,ket,c:cat,n:'',jml});
  localStorage.setItem(KEY,JSON.stringify(data));
  
  alert(`Tersimpan: ${ket} - ${cat} Rp ${jml.toLocaleString('id-ID')}`);
  document.getElementById('cat').value='';
  renderSaldo();
}
</script>
</body>
</html>
