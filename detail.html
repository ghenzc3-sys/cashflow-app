<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Detail Cashflow V13.0</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --biru:#2563eb;--biru-muda:#0ea5e9;--hijau:#10b981;--merah:#ef4444;--orange:#f97316;--ungu:#8b5cf6;--hijau-tua2:#059669;--abu-tua:#6b7280;
  --abu:#F3F4F6;--biru-soft:#dbeafe;--hijau-soft:#d1fae5;--merah-soft:#fee2e2;--orange-soft:#ffedd5;--ungu-soft:#ede9fe;--hijau-tua:#065f46;--merah-tua:#b91c1c}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#f3f4f6;margin:0;padding:16px}
.box{background:#fff;border-radius:20px;padding:20px;max-width:1000px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.head-left{display:flex;align-items:center;gap:12px}
.head h1{font-size:20px;font-weight:900;color:var(--biru);margin:0}
.head span{font-size:24px}
.btn-head-top{display:flex;gap:6px} /* [CSS] Wrapper tombol kanan atas: Undo, Redo, Export */
.btn-head-top button{border:none;background:var(--abu-tua);color:#fff;border-radius:8px;padding:6px 8px;font-size:14px;cursor:pointer;display:flex;align-items:center}
.btn-head-top button:disabled{background:#d1d5db;cursor:not-allowed;opacity:.6} /* [LOGIKA] Style tombol Undo/Redo saat disabled */
.btn-excel{background:var(--hijau-tua2)!important} /* [CSS] Warna khusus tombol Export Excel */
.top{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px} /* [CSS] Grid 5 Card Atas */
.mid{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:16px;align-items:center} /* [CSS] Grid Card Harian + Tombol Bawah */
.card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px;text-align:center}
.card.l{font-size:11px;font-weight:800;color:#6b7280;margin-bottom:4px;line-height:1.2} /* [CSS] Label Card */
.card.v{font-size:16px;font-weight:900;padding:4px;border-radius:8px} /* [CSS] Nilai Card */
.v.biru{color:var(--biru);background:var(--biru-soft)} /* [CSS] Card Saldo Kas */
.v.biru-muda{color:var(--biru-muda);background:var(--biru-soft)} /* [CSS] Card Total Masuk */
.v.hijau{color:var(--hijau);background:var(--hijau-soft)} /* [CSS] Card Piutang */
.v.merah{color:var(--merah);background:var(--merah-soft)} /* [CSS] Card Total Keluar */
.v.orange{color:var(--orange);background:var(--orange-soft)} /* [CSS] Card Utang */
.v.ungu{color:var(--ungu);background:var(--ungu-soft)} /* [CSS] Card Uang Harian */
.tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid #e5e7eb} /* [CSS] Wrapper Tabel biar bisa scroll */
table{width:100%;border-collapse:collapse;font-size:13px;min-width:650px}
thead{background:var(--biru);color:#fff;position:sticky;top:0} /* [CSS] Header Tabel nempel atas */
th,td{padding:10px 8px;text-align:center;border-bottom:1px solid #e5e7eb;white-space:nowrap}
tbody tr:nth-child(even){background:var(--abu)} /* [CSS] Warna zebra tabel */
.masuk{color:var(--biru-muda);font-weight:800} /* [CSS] Teks Nominal Masuk */
.keluar{color:var(--merah);font-weight:800} /* [CSS] Teks Nominal Keluar */
.sisa-plus{background:var(--hijau-soft)!important;font-weight:900;color:var(--hijau-tua)} /* [LOGIKA] Warna Sisa Harian > 0 */
.sisa-minus{background:var(--merah-soft)!important;font-weight:900;color:var(--merah-tua)} /* [LOGIKA] Warna Sisa Harian < 0 */
tfoot td{font-weight:900;background:var(--biru);color:#fff} /* [CSS] Footer Total */
.btn-del{border:none;background:var(--merah);color:#fff;border-radius:8px;padding:4px 8px;font-size:12px;cursor:pointer} /* [CSS] Tombol X Hapus per baris */
.btn-head{display:flex;gap:6px} /* [CSS] Wrapper tombol bawah: Kosongkan, Back */
.btn-head a,.btn-head button{border:none;border-radius:10px;padding:8px 10px;font-weight:800;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
.btn-reset{background:var(--merah);color:#fff} /* [CSS] Tombol 🗑️ Kosongkan */
.btn-back{background:var(--biru);color:#fff} /* [CSS] Tombol ← Kembali Input */
@media(max-width:700px){.top{grid-template-columns:repeat(2,1fr)}.mid{grid-template-columns:1fr}.card.v{font-size:14px}} /* [CSS] Responsive HP */
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <div class="head-left"><span>📊</span><h1>Detail Cashflow V13.0</h1></div>
    <div class="btn-head-top">
      <button id="undo" title="Undo 5x">↩️</button> <!-- [TOMBOL] Ikon ↩️ Undo. Balik 1 state data -->
      <button id="redo" title="Redo 5x">↪️</button> <!-- [TOMBOL] Ikon ↪️ Redo. Maju 1 state data -->
      <button class="btn-excel" id="export" title="Export Excel">📊</button> <!-- [TOMBOL] Ikon 📊 Export ke.xlsx -->
    </div>
  </div>

  <div class="top">
    <div class="card"><div class="l">Saldo Kas</div><div class="v biru" id="kas">Rp 0</div></div> <!-- [CARD] Card Saldo Kas = Masuk - Keluar -->
    <div class="card"><div class="l">Total Masuk</div><div class="v biru-muda" id="masuk">Rp 0</div></div> <!-- [CARD] Card Total Masuk -->
    <div class="card"><div class="l">Total Keluar</div><div class="v merah" id="keluar">Rp 0</div></div> <!-- [CARD] Card Total Keluar -->
    <div class="card"><div class="l">Piutang</div><div class="v hijau" id="piutang">Rp 0</div></div> <!-- [CARD] Card Piutang. Logika: kembali - dipinjam -->
    <div class="card"><div class="l">Utang</div><div class="v orange" id="utang">Rp 0</div></div> <!-- [CARD] Card Utang. Logika: hutang - nyaur -->
  </div>

  <div class="mid">
    <div class="card"><div class="l">Uang Harian</div><div class="v ungu" id="harian">Rp 0</div></div> <!-- [CARD] Card Uang Harian = Saldo Kas / sisa hari bulan -->
    <div class="btn-head">
      <button class="btn-reset" id="kosong" title="Kosongkan">🗑️</button> <!-- [TOMBOL] Ikon 🗑️ Kosongkan semua data -->
      <a href="/" class="btn-back" title="Kembali Input">←</a> <!-- [TOMBOL] Ikon ← Kembali ke halaman input -->
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr><th>No</th><th>Tgl</th><th>Ket</th><th>Catatan</th><th>Nama</th><th>Nominal</th><th>Sisa Harian</th><th></th></tr>
      </thead>
      <tbody id="body"></tbody> <!-- [LOGIKA] Isi tabel dirender dari localStorage -->
      <tfoot>
        <tr><td colspan="7" style="text-align:right">TOTAL SALDO KAS</td><td id="tTotal">Rp 0</td></tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
const KEY='cashflow_v13'; // [KEY] Nama key localStorage data utama
const HISTORY_KEY='cashflow_history_v13'; // [KEY] Nama key localStorage history undo/redo
const HISTORY_LIMIT=5; // [LOGIKA] Limit history max 5x undo
let history=[], historyIndex=-1; // [VAR] Array history & posisi index sekarang

const rupiah=n=>'Rp '+Number(n||0).toLocaleString('id-ID'); // [FUNGSI] Format angka jadi Rp
const getData=()=>JSON.parse(localStorage.getItem(KEY)||'[]'); // [FUNGSI] Ambil data dari localStorage

const save=d=>{ // [LOGIKA] Fungsi simpan data + push history
  localStorage.setItem(KEY,JSON.stringify(d));
  pushHistory(d); // [LOGIKA] Tiap save langsung simpan ke history
  render(); // [LOGIKA] Render ulang tabel & card
}

const pushHistory=(state)=>{ // [LOGIKA] Masukin state ke array history
  // Kalau abis undo trus input, history depan dibuang
  history=history.slice(0,historyIndex+1);
  history.push(JSON.stringify(state));
  if(history.length>HISTORY_LIMIT){
    history.shift(); // [LOGIKA] Buang history paling lama kalau > 5
  }else{
    historyIndex++; // [LOGIKA] Majuin index kalau belum mentok
  }
  updateUndoRedoBtn(); // [LOGIKA] Update status disable tombol
}

const loadHistory=()=>{ // [LOGIKA] Load history pertama kali
  history=[localStorage.getItem(KEY)||'[]']; // State awal
  historyIndex=0;
  localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
}

const updateUndoRedoBtn=()=>{ // [LOGIKA] Disable/enable tombol Undo Redo
  document.getElementById('undo').disabled=historyIndex<=0; // [TOMBOL] Undo disable kalau di paling awal
  document.getElementById('redo').disabled=historyIndex>=history.length-1; // [TOMBOL] Redo disable kalau di paling akhir
}

const cLow=d=>d.toLowerCase().trim(); // [FUNGSI] Bikin lowercase & trim catatan/nama

const render=()=>{ // [LOGIKA] Fungsi utama render semua UI
  const d=getData();const body=document.getElementById('body');body.innerHTML='';
  let totalMasuk=0, totalKeluar=0, piutang=0, utang=0; // [VAR] Total sementara
  d.forEach(i=>{
    const cat=cLow(i.c||'');const jml=i.jml; // [VAR] Catatan & Jumlah per baris
    if(i.ket==='Masuk'){ // [LOGIKA] Kalau Masuk
      totalMasuk+=jml;
      if(cat==='kembali') piutang-=jml; // [LOGIKA] Catatan "kembali" ngurangin piutang
      if(cat==='hutang') utang+=jml; // [LOGIKA] Catatan "hutang" nambah utang
    }else{ // [LOGIKA] Kalau Keluar
      totalKeluar+=jml;
      if(cat==='dipinjam') piutang+=jml; // [LOGIKA] Catatan "dipinjam" nambah piutang
      if(cat==='nyaur') utang-=jml; // [LOGIKA] Catatan "nyaur" ngurangin utang
    }
  });
  const saldoKas=totalMasuk-totalKeluar; // [LOGIKA] Hitung Saldo Kas
  const now=new Date();
  const lastDay=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate(); // [LOGIKA] Ambil tgl terakhir bulan
  const today=now.getDate();
  const sisaHari=Math.max(1, lastDay-today+1); // [LOGIKA] Sisa hari, minimal 1
  const uangHarian=saldoKas/sisaHari; // [LOGIKA] Hitung Uang Harian

  // [DOM] Isi semua Card
  document.getElementById('kas').innerText=rupiah(saldoKas);
  document.getElementById('masuk').innerText=rupiah(totalMasuk);
  document.getElementById('keluar').innerText=rupiah(totalKeluar);
  document.getElementById('piutang').innerText=rupiah(Math.max(0, piutang)); // [LOGIKA] Piutang min 0
  document.getElementById('utang').innerText=rupiah(Math.max(0, utang)); // [LOGIKA] Utang min 0
  document.getElementById('harian').innerText=rupiah(uangHarian);
  document.getElementById('tTotal').innerText=rupiah(saldoKas);

  const byDate={};d.forEach(i=>{byDate[i.t]=byDate[i.t]||[];byDate[i.t].push(i)}); // [LOGIKA] Kelompokin data per tanggal
  let saldoSebelumnya=0;let idx=1; // [VAR] Buat hitung Sisa Harian
  Object.keys(byDate).sort((a,b)=>new Date(a.split('/').reverse().join('-'))-new Date(b.split('/').reverse().join('-'))).forEach(tgl=>{
    const list=byDate[tgl];
    const totalMasukTgl=list.filter(i=>i.ket==='Masuk').reduce((s,i)=>s+i.jml,0);
    const totalKeluarTgl=list.filter(i=>i.ket==='Keluar').reduce((s,i)=>s+i.jml,0);
    const sisaHarian=saldoSebelumnya+totalMasukTgl-totalKeluarTgl; // [LOGIKA] Sisa Harian kumulatif
    let zebra=0; // [VAR] Buat warna selang-seling
    list.forEach((i,j)=>{
      body.insertAdjacentHTML('beforeend',` // [DOM] Render 1 baris tabel
        <tr style="background:${zebra?'var(--abu)':'#fff'}">
          <td>${idx++}</td><td>${i.t}</td><td class="${i.ket==='Masuk'?'masuk':'keluar'}">${i.ket}</td><td>${i.c||'-'}</td><td>${i.n||'-'}</td><td class="${i.ket==='Masuk'?'masuk':'keluar'}">${rupiah(i.jml)}</td>
          <td class="${j===list.length-1? (sisaHarian < 0? 'sisa-minus' : 'sisa-plus') : ''}">${j===list.length-1?rupiah(sisaHarian):''}</td> <!-- [LOGIKA] Sisa Harian cuma muncul di baris terakhir per tanggal -->
          <td><button class="btn-del" onclick="hapus(${d.indexOf(i)})">X</button></td> <!-- [TOMBOL] Tombol X Hapus 1 baris -->
        </tr>`);zebra=zebra^1;
    });
    saldoSebelumnya=sisaHarian;
  });
}

window.hapus=idx=>{ // [TOMBOL] Logika tombol X Hapus
  if(confirm('Hapus data ini?')){
    const d=getData();d.splice(idx,1); // [LOGIKA] Hapus 1 index dari array
    save(d); // [LOGIKA] Simpan + masuk history
  }
}
document.getElementById('kosong').onclick=()=>{ // [TOMBOL] Logika tombol 🗑️ Kosongkan
  if(confirm('Yakin kosongkan semua data?')){
    save([]); // [LOGIKA] Kosongin array + masuk history
  }
}

document.getElementById('undo').onclick=()=>{ // [TOMBOL] Logika tombol ↩️ Undo
  if(historyIndex>0){
    historyIndex--; // [LOGIKA] Mundur 1 index
    localStorage.setItem(KEY,history[historyIndex]); // [LOGIKA] Balikin data ke state lama
    render(); // [LOGIKA] Render ulang
    updateUndoRedoBtn();
  }
}
document.getElementById('redo').onclick=()=>{ // [TOMBOL] Logika tombol ↪️ Redo
  if(historyIndex<history.length-1){
    historyIndex++; // [LOGIKA] Maju 1 index
    localStorage.setItem(KEY,history[historyIndex]); // [LOGIKA] Balikin data ke state baru
    render(); // [LOGIKA] Render ulang
    updateUndoRedoBtn();
  }
}

document.getElementById('export').onclick=()=>{ // [TOMBOL] Logika tombol 📊 Export
  const d=getData();
  if(d.length===0){alert('Data kosong, gak ada yg di export');return} // [LOGIKA] Cegah export kalau kosong
  const ws_data=[['No','Tanggal','Keterangan','Catatan','Nama','Nominal']]; // [LOGIKA] Header Excel
  d.forEach((i,idx)=>ws_data.push([idx+1,i.t,i.ket,i.c||'',i.n||'',i.jml])); // [LOGIKA] Isi Excel dari data
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Cashflow');
  XLSX.writeFile(wb,`cashflow_${new Date().toISOString().slice(0,10)}.xlsx`); // [LOGIKA] Download file.xlsx
}

// Inisialisasi
if(!localStorage.getItem(HISTORY_KEY)){loadHistory()}else{history=JSON.parse(localStorage.getItem(HISTORY_KEY));historyIndex=history.length-1} // [LOGIKA] Load history saat pertama buka
render(); // [LOGIKA] Render pertama kali
updateUndoRedoBtn(); // [LOGIKA] Set status tombol pertama kali
</script>
</body>
</html>
