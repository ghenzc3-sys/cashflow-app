<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Cashflow</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f4f6f8; 
      padding: 20px; 
      margin: 0; 
    }
    h1 { 
      text-align: center; 
      color: #2563eb; 
      font-size: 32px; 
      font-weight: 900; 
      margin: 0 0 20px 0; 
      padding: 16px 0; 
      background: white; 
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }
    .form-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: 0 auto 20px auto;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    label {
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
      display: block;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      grid-column: span 2;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-simpan { background: #2563eb; color: white; }
    .btn-detail { background: #059669; color: white; }
    .btn-reset { background: #6b7280; color: white; }
    
    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .btn-group { grid-column: span 1; flex-direction: column; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <h1>Input Cashflow</h1>

  <div class="form-box">
    <div class="form-grid">
      <div>
        <label>Tanggal</label>
        <input type="date" id="tanggal">
      </div>
      <div>
        <label>Item</label>
        <input type="text" id="item" placeholder="Contoh: Gaji, Makan">
      </div>
      <div>
        <label>Nama</label>
        <input type="text" id="nama" placeholder="Contoh: Budi">
      </div>
      <div>
        <label>Jenis Transaksi</label>
        <select id="jenis">
          <option value="masuk">Masuk</option>
          <option value="keluar">Keluar</option>
          <option value="hutang">Hutang</option>
          <option value="minjemin">Minjemin</option>
          <option value="dikembalikan">Dikembalikan</option>
          <option value="pengembalian">Pengembalian</option>
        </select>
      </div>
      <div style="grid-column: span 2;">
        <label>Nominal</label>
        <input type="number" id="nominal" placeholder="0" min="0">
      </div>
      <div class="btn-group">
        <button class="btn btn-simpan" onclick="simpanData()">Simpan</button>
        <button class="btn btn-reset" onclick="resetForm()">Reset</button>
        <button class="btn btn-detail" onclick="window.location.href='detail.html'">Lihat Detail →</button>
      </div>
    </div>
  </div>

  <script>
    // Auto isi tanggal hari ini
    document.getElementById('tanggal').valueAsDate = new Date();

    function formatRupiah(num) {
      return 'Rp ' + Number(num || 0).toLocaleString('id-ID');
    }

    function simpanData() {
      const tanggal = document.getElementById('tanggal').value;
      const item = document.getElementById('item').value.trim();
      const nama = document.getElementById('nama').value.trim();
      const jenis = document.getElementById('jenis').value;
      const nominal = Number(document.getElementById('nominal').value) || 0;

      if (!tanggal || !item || nominal <= 0) {
        alert('Tanggal, Item, dan Nominal wajib diisi & > 0');
        return;
      }

      // Ambil data lama dari localStorage dengan key 'cashflowData'
      const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');

      // Bikin object baru sesuai key yang dibaca detail.html
      const newData = {
        tanggal: tanggal,
        item: item,
        nama: nama,
        masuk: jenis === 'masuk' || jenis === 'pengembalian' ? nominal : 0,
        keluar: jenis === 'keluar' || jenis === 'dikembalikan' ? nominal : 0,
        hutang: jenis === 'hutang' ? nominal : 0,
        minjemin: jenis === 'minjemin' ? nominal : 0,
        dikembalikan: jenis === 'dikembalikan' ? nominal : 0,
        pengembalian: jenis === 'pengembalian' ? nominal : 0
      };

      data.push(newData);
      
      // Simpan lagi dengan key 'cashflowData' PENTING!
      localStorage.setItem('cashflowData', JSON.stringify(data));
      
      alert('Data berhasil disimpan!');
      resetForm();
    }

    function resetForm() {
      document.getElementById('item').value = '';
      document.getElementById('nama').value = '';
      document.getElementById('nominal').value = '';
      document.getElementById('jenis').value = 'masuk';
      document.getElementById('tanggal').valueAsDate = new Date();
    }
  </script>
</body>
</html>
