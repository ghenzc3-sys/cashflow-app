<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
      .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            text-align: center;
            width: 500px;
        }
        h1 {
            color: #004080;
            margin-bottom: 15px;
            font-size: 42px;
        }
      .emoji {
            font-size: 60px;
            margin: 15px 0;
        }
      .label {
            color: #004080;
            font-size: 24px;
            margin: 25px 0 10px;
            font-weight: bold;
        }
      .saldo-box {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
      .saldo {
            border: 3px solid #004080;
            border-radius: 12px;
            padding: 18px 20px;
            font-size: 28px;
            font-weight: bold;
            color: #004080;
            width: 280px;
            text-align: center;
        }
      .eye-btn {
            background: #004080;
            border: none;
            border-radius: 12px;
            width: 65px;
            cursor: pointer;
            font-size: 28px;
        }
      .input-box {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }
        input {
            flex: 1;
            padding: 18px;
            border: 3px solid #004080;
            border-radius: 12px;
            font-size: 20px;
        }
        input::placeholder {
            font-size: 18px;
        }
      .simpan {
            background: #004080;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
        }
      .keyword {
            font-size: 15px;
            color: #888;
            margin: 12px 0 25px;
        }
      .detail {
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
        }
      .simpan:hover { background: #002a50; }
      .detail:hover { background: #218838; }
      .eye-btn:hover { background: #002a50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cashflow</h1>
        <div class="emoji">🐱</div>

        <div class="label">Saldo</div>
        <div class="saldo-box">
            <div class="saldo" id="saldo">Rp 0</div>
            <button class="eye-btn" id="toggleBtn">👁️</button>
        </div>

        <div class="input-box">
            <input type="text" id="inputData" placeholder="isi disini">
            <button class="simpan" id="simpanBtn">Simpan</button>
        </div>
        <div class="keyword">Keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali</div>

        <button class="detail" id="detailBtn">Detail</button>
    </div>

<script>
let saldoTersembunyi = false;

function formatRupiah(angka) {
    return 'Rp ' + angka.toLocaleString('id-ID');
}

function updateSaldo() {
    let saldo = parseInt(localStorage.getItem('saldoCashflow')) || 0;
    document.getElementById('saldo').textContent = saldoTersembunyi? 'Rp *******' : formatRupiah(saldo);
}

document.getElementById('toggleBtn').addEventListener('click', function() {
    saldoTersembunyi =!saldoTersembunyi;
    updateSaldo();
});

document.getElementById('simpanBtn').addEventListener('click', function() {
    let input = document.getElementById('inputData').value.trim().toLowerCase();
    if(!input) return alert('Isi dulu bang!');

    let data = JSON.parse(localStorage.getItem('dataDetailCashflow')) || [];
    let no = data.length + 1;
    let tanggal = new Date().toLocaleDateString('id-ID');

    let row = {
        no: no,
        tanggal: tanggal,
        item: '',
        nama: '',
        minjemin: '',
        hutang: 0,
        kembali: 0,
        pengembalian: 0,
        masuk: 0,
        keluar: 0,
        sisa: 0
    };

    let parts = input.split(' ');
    let nominal = parseInt(parts[parts.length-1]);
    if(isNaN(nominal)) return alert('Nominal harus angka bang!');

    let item = parts[0];

    if(item === 'gaji' || item === 'upah' || item === 'masuk') {
        row.item = 'Masuk';
        row.masuk = nominal;
    } else if(item === 'keluar' || item === 'beli' || item === 'bayar') {
        row.item = 'Keluar';
        row.keluar = nominal;
    } else if(item === 'hutang') {
        row.item = 'Hutang';
        row.nama = parts.slice(1, -1).join(' ');
        row.hutang = nominal;
    } else if(item === 'minjemin') {
        row.item = 'Minjemin';
        row.nama = parts.slice(1, -1).join(' ');
        row.hutang = nominal;
    } else if(item === 'kembali') {
        row.item = 'Kembali';
        row.nama = parts.slice(1, -1).join(' ');
        row.pengembalian = nominal;
    } else {
        return alert('Format salah bang!');
    }

    let saldo = parseInt(localStorage.getItem('saldoCashflow')) || 0;
    saldo = saldo + row.masuk - row.keluar;
    row.sisa = saldo;
    localStorage.setItem('saldoCashflow', saldo);

    data.push(row);
    localStorage.setItem('dataDetailCashflow', JSON.stringify(data));

    document.getElementById('inputData').value = '';
    updateSaldo();
    alert('Data tersimpan!');
});

document.getElementById('detailBtn').addEventListener('click', function() {
    window.location.href = 'detail.html';
});

document.getElementById('inputData').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') document.getElementById('simpanBtn').click();
});

window.onload = updateSaldo;
</script>
</body>
</html>
