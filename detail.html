<script>
const KEY='cashflow_v13';
const HISTORY_KEY='cashflow_history_v13';
const HISTORY_LIMIT=5;
let history=[], historyIndex=-1;

const rupiah=n=>'Rp '+Number(n||0).toLocaleString('id-ID');
const getData=()=>JSON.parse(localStorage.getItem(KEY)||'[]');

const saveHistoryToStorage=()=>{
  localStorage.setItem(HISTORY_KEY,JSON.stringify({h:history,i:historyIndex}));
}

const loadHistoryFromStorage=()=>{
  const saved=localStorage.getItem(HISTORY_KEY);
  if(saved){
    const parsed=JSON.parse(saved);
    history=parsed.h||[localStorage.getItem(KEY)||'[]'];
    historyIndex=parsed.i??history.length-1;
  }else{
    history=[localStorage.getItem(KEY)||'[]'];
    historyIndex=0;
  }
}

// 1. INI UBAH: `save` cuma nyimpen ke localStorage. Gak push history lagi
const save=(d)=>{
  localStorage.setItem(KEY,JSON.stringify(d));
  render();
}

// 2. INI UBAH: Bikin fungsi baru khusus buat aksi yang mau di-undo
const doAction=(newData)=>{
  localStorage.setItem(KEY,JSON.stringify(newData)); // Simpan data baru

  history=history.slice(0,historyIndex+1); // Potong history 'masa depan'
  history.push(JSON.stringify(newData)); // Simpan state baru ke history
  if(history.length>HISTORY_LIMIT){
    history.shift(); // Buang yang paling lama
  }else{
    historyIndex++; // Majuin index kalau gak dibuang
  }
  saveHistoryToStorage();
  updateUndoRedoBtn();
  render();
}

const updateUndoRedoBtn=()=>{
  document.getElementById('undo').disabled=historyIndex<=0;
  document.getElementById('redo').disabled=historyIndex>=history.length-1;
}

const cLow=d=>d.toLowerCase().trim();

const render=()=>{
  const d=getData();const body=document.getElementById('body');body.innerHTML='';
  let totalMasuk=0, totalKeluar=0, piutang=0, utang=0;
  d.forEach(i=>{
    const cat=cLow(i.c||'');const jml=i.jml;
    if(i.ket==='Masuk'){
      totalMasuk+=jml;
      if(cat==='kembali') piutang-=jml;
      if(cat==='hutang') utang+=jml;
    }else{
      totalKeluar+=jml;
      if(cat==='dipinjam') piutang+=jml;
      if(cat==='nyaur') utang-=jml;
    }
  });
  const saldoKas=totalMasuk-totalKeluar;
  const now=new Date();
  const lastDay=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const today=now.getDate();
  const sisaHari=Math.max(1, lastDay-today+1);
  const uangHarian=saldoKas/sisaHari;

  document.getElementById('kas').innerText=rupiah(saldoKas);
  document.getElementById('masuk').innerText=rupiah(totalMasuk);
  document.getElementById('keluar').innerText=rupiah(totalKeluar);
  document.getElementById('piutang').innerText=rupiah(Math.max(0, piutang));
  document.getElementById('utang').innerText=rupiah(Math.max(0, utang));
  document.getElementById('harian').innerText=rupiah(uangHarian);
  document.getElementById('tTotal').innerText=rupiah(saldoKas);

  const byDate={};d.forEach(i=>{byDate[i.t]=byDate[i.t]||[];byDate[i.t].push(i)});
  let saldoSebelumnya=0;let idx=1;
  Object.keys(byDate).sort((a,b)=>new Date(a.split('/').reverse().join('-'))-new Date(b.split('/').reverse().join('-'))).forEach(tgl=>{
    const list=byDate[tgl];
    const totalMasukTgl=list.filter(i=>i.ket==='Masuk').reduce((s,i)=>s+i.jml,0);
    const totalKeluarTgl=list.filter(i=>i.ket==='Keluar').reduce((s,i)=>s+i.jml,0);
    const sisaHarian=saldoSebelumnya+totalMasukTgl-totalKeluarTgl;
    let zebra=0;
    list.forEach((i,j)=>{
      body.insertAdjacentHTML('beforeend',`
        <tr style="background:${zebra?'var(--abu)':'#fff'}">
          <td>${idx++}</td><td>${i.t}</td><td class="${i.ket==='Masuk'?'masuk':'keluar'}">${i.ket}</td><td>${i.c||'-'}</td><td>${i.n||'-'}</td><td class="${i.ket==='Masuk'?'masuk':'keluar'}">${rupiah(i.jml)}</td>
          <td class="${j===list.length-1? (sisaHarian < 0? 'sisa-minus' : 'sisa-plus') : ''}">${j===list.length-1?rupiah(sisaHarian):''}</td>
          <td><button class="btn-del" onclick="hapus(${d.indexOf(i)})">X</button></td>
        </tr>`);zebra=zebra^1;
    });
    saldoSebelumnya=sisaHarian;
  });
}

// 3. INI UBAH: Pake `doAction` bukan `save`
window.hapus=idx=>{
  if(confirm('Hapus data ini?')){
    const d=getData();d.splice(idx,1);
    doAction(d); // <-- 1 hapus = 1 state history
  }
}
document.getElementById('kosong').onclick=()=>{
  if(confirm('Yakin kosongkan semua data?')){
    doAction([]); // <-- 1 kosongkan = 1 state history
  }
}

// Undo Redo tetep sama persis, gak diotak atik
document.getElementById('undo').onclick=()=>{
  if(historyIndex>0){
    historyIndex--;
    localStorage.setItem(KEY, history[historyIndex]);
    render();
    saveHistoryToStorage();
    updateUndoRedoBtn();
  }
}
document.getElementById('redo').onclick=()=>{
  if(historyIndex<history.length-1){
    historyIndex++;
    localStorage.setItem(KEY, history[historyIndex]);
    render();
    saveHistoryToStorage();
    updateUndoRedoBtn();
  }
}

document.getElementById('export').onclick=()=>{
  const d=getData();
  if(d.length===0){alert('Data kosong, gak ada yg di export');return}

  const kas = document.getElementById('kas').innerText;
  const masuk = document.getElementById('masuk').innerText;
  const keluar = document.getElementById('keluar').innerText;
  const piutang = document.getElementById('piutang').innerText;
  const utang = document.getElementById('utang').innerText;
  const harian = document.getElementById('harian').innerText;
  const total = document.getElementById('tTotal').innerText;

  const ws_data = [
    ['LAPORAN CASHFLOW'],[],['RANGKUMAN'],
    ['Saldo Kas', kas],['Total Masuk', masuk],['Total Keluar', keluar],
    ['Piutang', piutang],['Utang', utang],['Uang Harian', harian],
    [],['DETAIL TRANSAKSI'],['No','Tanggal','Keterangan','Catatan','Nama','Nominal','Sisa Harian']
  ];

  const byDate={};d.forEach(i=>{byDate[i.t]=byDate[i.t]||[];byDate[i.t].push(i)});
  let saldoSebelumnya=0;let idx=1;
  Object.keys(byDate).sort((a,b)=>new Date(a.split('/').reverse().join('-'))-new Date(b.split('/').reverse().join('-'))).forEach(tgl=>{
    const list=byDate[tgl];
    const totalMasukTgl=list.filter(i=>i.ket==='Masuk').reduce((s,i)=>s+i.jml,0);
    const totalKeluarTgl=list.filter(i=>i.ket==='Keluar').reduce((s,i)=>s+i.jml,0);
    const sisaHarian=saldoSebelumnya+totalMasukTgl-totalKeluarTgl;
    list.forEach((i,j)=>{
      ws_data.push([idx++,i.t,i.ket,i.c||'-',i.n||'-',i.jml,j===list.length-1? sisaHarian : '']);
    });
    saldoSebelumnya=sisaHarian;
  });
  ws_data.push([]);
  ws_data.push(['','TOTAL SALDO KAS','','',total]);

  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cashflow Laporan');
  XLSX.writeFile(wb, `cashflow_laporan_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// Inisialisasi
loadHistoryFromStorage();
render();
updateUndoRedoBtn();
</script>
