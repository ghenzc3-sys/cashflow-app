<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Cashflow V13.8.3 Mod</title>
<style>
  body{margin:0;background:#f5f7fb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;padding:20px}
.wrap{max-width:1100px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:20px}
  h1{margin:0 0 16px;font-size:18px;color:#3b82f6;display:flex;gap:8px;align-items:center}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.stat{background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:10px;text-align:center}
.stat.label{font-size:12px;color:#6b7280;display:block}
.stat.val{font-size:16px;font-weight:700;color:#2563eb}
.stat.val.danger{color:#dc2626}
.stat.val.hijau{color:#16a34a}
.stat.val.orange{color:#ea580c}
.harian{text-align:center;margin:12px 0 20px;color:#6b7280;font-size:14px}
.harian b{color:#8b5cf6;font-size:18px;display:block}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead{background:#3b82f6;color:#fff}
  th,td{padding:10px;text-align:left}
  th{font-weight:600}
  tbody tr:nth-child(even){background:#f9fafb}
.right{text-align:right}
.keluar{color:#dc2626;font-weight:600}
.masuk{color:#2563eb;font-weight:600}
.btn-x{background:#ef4444;color:#fff;border:0;border-radius:50%;width:24px;height:24px;cursor:pointer;font-weight:700}
.total-row{background:#3b82f6;color:#fff;font-weight:700}
.top-btns{display:flex;gap:8px;position:absolute;right:20px;top:20px}
.top-btns button{height:32px;border:0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;padding:0 12px}
.btn-undo{background:#64748b;color:#fff}
.btn-redo{background:#64748b;color:#fff}
.btn-export{background:#22c55e;color:#fff}
.btn-kosongkan{background:#f97316;color:#fff}
.btn-back{background:#3b82f6;color:#fff}
.rel{position:relative}
</style>
</head>
<body>
  <div class="wrap rel">
    <div class="top-btns">
      <button class="btn-back" onclick="location.href='index.html'">Back</button>
      <button class="btn-kosongkan" id="btnKosongkan">Kosongkan</button>
      <button class="btn-undo" title="Undo">↶</button>
      <button class="btn-redo" title="Redo">↷</button>
      <button class="btn-export" id="btnExport">Export</button>
    </div>
    <h1>📊 Detail Cashflow V13.8.3 Mod</h1>
    
    <div class="stats" id="stats"></div>
    
    <div class="harian">
      Uang Harian
      <b id="uangHarian">Rp 0</b>
    </div>

    <table id="tbl">
      <thead><tr><th>No</th><th>Tgl</th><th>Ket</th><th>Catatan</th><th>Nama</th><th>Nominal</th><th>Sisa Harian</th><th>Aksi</th></tr></thead>
      <tbody></tbody>
      <tfoot><tr class="total-row"><td colspan="5" class="right">TOTAL SALDO KAS</td><td colspan="3" id="totalSaldo">Rp 0</td></tr></tfoot>
    </table>
  </div>

<script>
const KEY = 'cashflow';
const FMT = new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0});

// DATA CONTOH 3 BARIS MINUS SESUAI FOTO LAPTOPMU
let data = [
  {id:'1',tgl:'2026-09-04',jenis:'out',ket:'Nyusur pak joko',catatan:'-',nama:'pak joko',jumlah:5000},
  {id:'2',tgl:'2026-09-04',jenis:'out',ket:'Dipinjam bu eni',catatan:'-',nama:'bu eni',jumlah:60000},
  {id:'3',tgl:'2026-09-04',jenis:'in',ket:'Kembali bu eni',catatan:'-',nama:'bu eni',jumlah:5000},
];
localStorage.setItem(KEY,JSON.stringify(data));

let history = [JSON.stringify(data)];
let historyIndex = 0;

function saveHistory(){
  history = history.slice(0,historyIndex+1);
  history.push(JSON.stringify(data));
  historyIndex++;
}

function render(){
  const sumIn = data.filter(d=>d.jenis==='in').reduce((a,b)=>a+b.jumlah,0);
  const sumOut = data.filter(d=>d.jenis==='out').reduce((a,b)=>a+b.jumlah,0);
  const saldo = sumIn - sumOut;
  const piutang = data.filter(d=>d.jenis==='in'&&d.nama!=='-').reduce((a,b)=>a+b.jumlah,0);
  const utang = data.filter(d=>d.jenis==='out'&&d.nama!=='-').reduce((a,b)=>a+b.jumlah,0);
  const harian = Math.floor(saldo/30);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="label">Saldo Kas</span><div class="val ${saldo<0?'danger':''}">${FMT.format(saldo)}</div></div>
    <div class="stat"><span class="label">Total Masuk</span><div class="val">${FMT.format(sumIn)}</div></div>
    <div class="stat"><span class="label">Total Keluar</span><div class="val danger">${FMT.format(sumOut)}</div></div>
    <div class="stat"><span class="label">Piutang</span><div class="val hijau">${FMT.format(piutang)}</div></div>
    <div class="stat"><span class="label">Utang</span><div class="val orange">${FMT.format(utang)}</div></div>`;
  document.getElementById('uangHarian').textContent = FMT.format(harian);
  document.getElementById('totalSaldo').textContent = FMT.format(saldo);

  const tbody = document.querySelector('#tbl tbody'); tbody.innerHTML='';
  let sisa = saldo;
  data.sort((a,b)=>a.tgl.localeCompare(b.tgl)).forEach((r,i)=>{
    if(r.jenis==='out') sisa -= r.jumlah;
    tbody.innerHTML += `<tr>
      <td>${i+1}</td><td>${r.tgl.split('-').reverse().join('/')}</td>
      <td class="${r.jenis}">${r.ket}</td><td>${r.catatan}</td><td>${r.nama}</td>
      <td class="right ${r.jenis}">${FMT.format(r.jumlah)}</td><td class="right">${FMT.format(sisa)}</td>
      <td><button class="btn-x" onclick="hapus('${r.id}')">X</button></td>
    </tr>`;
    if(r.jenis==='in') sisa += r.jumlah;
  });
}

function hapus(id){ data=data.filter(x=>x.id!==id); saveHistory(); localStorage.setItem(KEY,JSON.stringify(data)); render(); }

// 1. EXPORT CSV BENERAN
document.getElementById('btnExport').onclick = ()=>{
  let csv = 'No,Tgl,Ket,Catatan,Nama,Jenis,Nominal\n';
  data.forEach((r,i)=>{
    csv += `${i+1},${r.tgl},${r.ket},${r.catatan},${r.nama},${r.jenis},${r.jumlah}\n`;
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cashflow_v1383.csv'; a.click();
  URL.revokeObjectURL(url);
}

// 2. KOSONGKAN CUMA DI DETAIL SAJA, GAK KE INDEX
document.getElementById('btnKosongkan').onclick = ()=>{
  if(confirm('Kosongkan semua data di halaman ini? Data index aman.')){
    data = []; saveHistory(); localStorage.setItem(KEY,JSON.stringify(data)); render();
  }
}

// 3. UNDO REDO
document.querySelector('.btn-undo').onclick = ()=>{ if(historyIndex>0){historyIndex--;data=JSON.parse(history[historyIndex]);render();}}
document.querySelector('.btn-redo').onclick = ()=>{ if(historyIndex<history.length-1){historyIndex++;data=JSON.parse(history[historyIndex]);render();}}

render();
</script>
</body>
</html>
