<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Detail Cashflow</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --biru:#2563eb;--biru-muda:#0ea5e9;--hijau:#10b981;--merah:#ef4444;--orange:#f97316;--ungu:#8b5cf6;--hijau-tua2:#059669;--abu-tua:#6b7280;
  --abu:#F3F4F6;--biru-soft:#dbeafe;--hijau-soft:#d1fae5;--merah-soft:#fee2e2;--orange-soft:#ffedd5;--ungu-soft:#ede9fe;--hijau-tua:#065f46;--merah-tua:#b91c1c}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#f3f4f6;margin:0;padding:16px}
.box{background:#fff;border-radius:20px;padding:20px;max-width:1000px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.head-left{display:flex;align-items:center;gap:12px}
.head h1{font-size:20px;font-weight:900;color:var(--biru);margin:0}
.head span{font-size:24px}
.btn-head-top{display:flex;gap:6px}
.btn-head-top button{border:none;background:var(--abu-tua);color:#fff;border-radius:8px;padding:6px 8px;font-size:14px;cursor:pointer;display:flex;align-items:center;transition:.2s}
.btn-head-top button:disabled{background:#d1d5db;cursor:not-allowed;opacity:.6}
.btn-excel{background:var(--hijau-tua2)!important}
.top{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.mid{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:16px;align-items:center}
.card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px;text-align:center}
.card.l{font-size:11px;font-weight:800;color:#6b7280;margin-bottom:4px;line-height:1.2}
.card.v{font-size:16px;font-weight:900;padding:4px;border-radius:8px}
.v.biru{color:var(--biru);background:var(--biru-soft)}
.v.biru-muda{color:var(--biru-muda);background:var(--biru-soft)}
.v.hijau{color:var(--hijau);background:var(--hijau-soft)}
.v.merah{color:var(--merah);background:var(--merah-soft)}
.v.orange{color:var(--orange);background:var(--orange-soft)}
.v.ungu{color:var(--ungu);background:var(--ungu-soft)}
.tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid #e5e7eb}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:650px}
thead{background:var(--biru);color:#fff;position:sticky;top:0}
th,td{padding:10px 8px;text-align:center;border-bottom:1px solid #e5e7eb;white-space:nowrap}
tbody tr:nth-child(even){background:var(--abu)}
.masuk{color:var(--biru-muda);font-weight:800}
.keluar{color:var(--merah);font-weight:800}
.sisa-plus{background:var(--hijau-soft)!important;font-weight:900;color:var(--hijau-tua)}
.sisa-minus{background:var(--merah-soft)!important;font-weight:900;color:var(--merah-tua)}
tfoot td{font-weight:900;background:var(--biru);color:#fff}
.btn-del{border:none;background:var(--merah);color:#fff;border-radius:8px;padding:4px 8px;font-size:12px;cursor:pointer}
.btn-head{display:flex;gap:6px}
.btn-head a,.btn-head button{border:none;border-radius:10px;padding:8px 10px;font-weight:800;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
.btn-reset{background:var(--merah);color:#fff}
.btn-back{background:var(--biru);color:#fff}
@media(max-width:700px){.top{grid-template-columns:repeat(2,1fr)}.mid{grid-template-columns:1fr}.card.v{font-size:14px}}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <div class="head-left"><span>📊</span><h1>Detail Cashflow V13.1</h1></div>
    <div class="btn-head-top">
      <button id="undo" title="Undo 5x">↩️</button>
      <button id="redo" title="Redo 5x">↪️</button>
      <button class="btn-excel" id="export" title="Export Excel">📊</button>
    </div>
  </div>

  <div class="top">
    <div class="card"><div class="l">Saldo Kas</div><div class="v biru" id="kas">Rp 0</div></div>
    <div class="card"><div class="l">Total Masuk</div><div class="v biru-muda" id="masuk">Rp 0</div></div>
    <div class="card"><div class="l">Total Keluar</div><div class="v merah" id="keluar">Rp 0</div></div>
    <div class="card"><div class="l">Piutang</div><div class="v hijau" id="piutang">Rp 0</div></div>
    <div class="card"><div class="l">Utang</div><div class="v orange" id="utang">Rp 0</div></div>
  </div>

  <div class="mid">
    <div class="card"><div class="l">Uang Harian</div><div class="v ungu" id="harian">Rp 0</div></div>
    <div class="btn-head">
      <button class="btn-reset" id="kosong" title="Kosongkan">🗑️</button>
      <a href="/" class="btn-back" title="Kembali Input">←</a>
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr><th>No</th><th>Tgl</th><th>Ket</th><th>Catatan</th><th>Nama</th><th>Nominal</th><th>Sisa Harian</th><th></th></tr>
      </thead>
      <tbody id="body"></tbody>
      <tfoot>
        <tr><td colspan="7" style="text-align:right">TOTAL SALDO KAS</td><td id="tTotal">Rp 0</td></tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
const KEY='cashflow_v13_1'; // KEY BARU BIAR GAK CROSS DATA LAMA
const HISTORY_KEY='cashflow_history_v13_1';
const HISTORY_LIMIT=5;
let history=[], historyIndex=-1;

const rupiah=n=>'Rp '+Number(n||0).toLocaleString('id-ID');
const getData=()=>JSON.parse(localStorage.getItem(KEY)||'[]');

const save=(d, pushHist=true)=>{
  localStorage.setItem(KEY,JSON.stringify(d));
  if(pushHist) pushHistory(d);
  render();
}

const pushHistory=(state)=>{
  history=history.slice(0,historyIndex+1);
  history.push(JSON.stringify(state));
  if(history.length>HISTORY_LIMIT) history.shift();
  historyIndex=history.length-1;
  localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
  updateUndoRedoBtn();
}

const loadHistory=()=>{
  history=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
  historyIndex=history.length-1;
  if(history.length===0){
    const initial=getData();
    history=[JSON.stringify(initial)];
    historyIndex=0;
    localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
  }
}

const updateUndoRedoBtn=()=>{
  document.getElementById('undo').disabled=historyIndex<=0;
  document.getElementById('redo').disabled=historyIndex>=history.length-1;
}

const cLow=d=>d.toLowerCase().trim();

const render=()=>{
  const d=getData();const body=document.getElementById('body');body.innerHTML='';
  let totalMasuk=0, totalKeluar=0, piutang=0, utang=0;
  d.forEach(i=>{
    const cat=cLow(i.c||'');const jml=i.jml;
    if(i.ket==='Masuk'){
      totalMasuk+=jml;
      if(cat==='kembali') piutang-=jml;
      if(cat==='hutang') utang+=jml;
    }else{
      totalKeluar+=jml;
      if(cat==='dipinjam') piutang+=jml;
      if(cat==='nyaur') utang-=jml;
    }
  });
  const saldoKas=totalMasuk-totalKeluar;
  const now=new Date();
  const lastDay=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const today=now.getDate();
  const sisaHari=Math.max(1, lastDay-today+1);
  const uangHarian=saldoKas/sisaHari;

  document.getElementById('kas').innerText=rupiah(saldoKas);
  document.getElementById('masuk').innerText=rupiah(totalMasuk);
  document.getElementById('keluar').innerText=rupiah(totalKeluar);
  document.getElementById('piutang').innerText=rupiah(Math.max(0, piutang));
  document.getElementById('utang').innerText=rupiah(Math.max(0, utang));
  document.getElementById('harian').innerText=rupiah(uangHarian);
  document.getElementById('tTotal').innerText=rupiah(saldoKas);

  const byDate={};d.forEach(i=>{byDate[i.t]=byDate[i.t]||[];byDate[i.t].push(i)});
  let saldoSebelumnya=0;let idx=1;
  Object.keys(byDate).sort((a,b)=>new Date(a.split('/').reverse().join('-'))-new Date(b.split('/').reverse().join('-'))).forEach(tgl=>{
    const list=byDate[tgl];
    const totalMasukTgl=list.filter(i=>i.ket==='Masuk').reduce((s,i)=>s+i.jml,0);
    const totalKeluarTgl=list.filter(i=>i.ket==='Keluar').reduce((s,i)=>s+i.jml,0);
    const sisaHarian=saldoSebelumnya+totalMasukTgl-totalKeluarTgl;
    let zebra=0;
    list.forEach((i,j)=>{
      body.insertAdjacentHTML('beforeend',`
        <tr style="background:${zebra?'var(--abu)':'#fff'}">
          <td>${idx++}</td><td>${i.t}</td><td class="${i.ket==='Masuk'?'masuk':'keluar'}">${i.ket}</td><td>${i.c||'-'}</td><td>${i.n||'-'}</td><td class="${i.ket==='Masuk'?'masuk':'keluar'}">${rupiah(i.jml)}</td>
          <td class="${j===list.length-1? (sisaHarian < 0? 'sisa-minus' : 'sisa-plus') : ''}">${j===list.length-1?rupiah(sisaHarian):''}</td>
          <td><button class="btn-del" onclick="hapus('${i.id}')">X</button></td> <!-- PAKAI ID BUKAN INDEX -->
        </tr>`);zebra=zebra^1;
    });
    saldoSebelumnya=sisaHarian;
  });
}

window.hapus=id=>{ // HAPUS PAKAI ID
  if(confirm('Hapus data ini?')){
    const d=getData().filter(i=>i.id!==id);
    save(d);
  }
}
document.getElementById('kosong').onclick=()=>{
  if(confirm('Yakin kosongkan semua data?')){
    save([]);
  }
}

document.getElementById('undo').onclick=()=>{
  if(historyIndex>0){
    historyIndex--;
    save(JSON.parse(history[historyIndex]), false); // false = jangan push history lagi
  }
}
document.getElementById('redo').onclick=()=>{
  if(historyIndex<history.length-1){
    historyIndex++;
    save(JSON.parse(history[historyIndex]), false);
  }
}

document.getElementById('export').onclick=()=>{
  const d=getData();
  if(d.length===0){alert('Data kosong, gak ada yg di export');return}
  const ws_data=[['No','Tanggal','Keterangan','Catatan','Nama','Nominal']];
  d.forEach((i,idx)=>ws_data.push([idx+1,i.t,i.ket,i.c||'',i.n||'',i.jml]));
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Cashflow');
  XLSX.writeFile(wb,`cashflow_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// Inisialisasi
loadHistory();
render();
</script>
</body>
</html>
