<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cashflow</title>
<style>
:root{--biru:#0ea5e9;--biru-gelap:#2563eb;--tosca:#2dd4bf;--merah:#ef4444;--hijau:#10b981}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--biru-gelap),var(--biru));margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;border-radius:28px;padding:28px;width:100%;max-width:420px;box-shadow:0 24px 48px rgba(0,0,0,.25);text-align:center}
.logo{font-size:36px;margin-bottom:8px}
h1{font-size:24px;font-weight:900;color:var(--biru-gelap);margin:0 0 18px}
.label{font-size:13px;color:#6b7280;letter-spacing:1.2px;margin-bottom:10px;font-weight:700}
.saldo-box{display:flex;gap:10px;align-items:center;margin-bottom:18px}
.saldo{flex:1;border:2.5px solid var(--biru);border-radius:18px;padding:16px;font-size:20px;font-weight:900;color:var(--biru-gelap);background:#f0f9ff}
.eye{background:var(--biru);color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;flex-shrink:0}
.input-wrap{display:flex;gap:10px;margin-bottom:8px}
.input{flex:1;border:2.5px solid #d1d5db;border-radius:18px;padding:14px 16px;font-size:16px;font-weight:600;transition:.2s}
.input:focus{outline:none;border-color:var(--biru)}
.input.error{border-color:var(--merah);background:#fef2f2}
.input.success{border-color:var(--hijau);background:#f0fdf4}
.btn-simpan{background:var(--biru);color:#fff;border:none;border-radius:18px;padding:14px 20px;font-weight:900;font-size:15px;cursor:pointer}
.btn-simpan:hover{opacity:.9}
.btn-detail{width:100%;background:var(--tosca);color:#fff;border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:900;cursor:pointer;margin-top:6px}
.btn-detail:hover{opacity:.9}
.hint{font-size:11px;color:#9ca3af;margin-top:4px;text-align:left;line-height:1.4}
.notif{font-size:13px;font-weight:700;margin-top:6px;min-height:18px;transition:.2s}
.notif.error{color:var(--merah)}
.notif.success{color:var(--hijau)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">💵</div>
  <h1>Cashflow</h1>
  <div class="label">SALDO SAAT INI</div>
  <div class="saldo-box">
    <div class="saldo" id="saldo">Rp *******</div>
    <button class="eye" id="eye">👁️</button>
  </div>
  <form id="form">
    <div class="input-wrap">
      <input class="input" id="cat" placeholder="beli cilok 5000" required>
      <button class="btn-simpan">Simpan</button>
    </div>
    <div class="notif" id="notif"></div>
  </form>
  <div class="hint">
    Masuk: gaji, upah, dapat, hutang+nama<br>
    Keluar: beli, bayar+nama, nyaur+nama, jajan
  </div>
  <button class="btn-detail" onclick="location.href='/detail.html'">Lihat Detail →</button>
</div>

<script>
const KEY='cashflow_v13';
let showSaldo=false;
const inputEl=document.getElementById('cat');
const notifEl=document.getElementById('notif');

const KEYWORDS={
  masuk:['gaji','upah','dapat'],
  masukNama:['hutang','kembali'],
  keluar:['beli','jajan'],
  keluarNama:['bayar','nyaur','dipinjam']
}

const showNotif=(msg,type)=>{
  notifEl.textContent=msg;
  notifEl.className='notif '+type;
  inputEl.className='input '+type;
  setTimeout(()=>{
    notifEl.textContent='';
    notifEl.className='notif';
    inputEl.className='input';
  },2500);
}

const parseStrict=(txt)=>{
  txt=txt.trim();
  const lower=txt.toLowerCase();
  const jml=Number(lower.match(/\d+/g)?.join('')||0);
  if(jml===0) return {err:'Nominal gak ketemu bang'};
  
  const kata=lower.replace(/\d+/g,'').trim().split(/\s+/);
  const key=kata[0];
  const sisa=kata.slice(1).join(' ');

  // 1. Cek Masuk tanpa nama
  if(KEYWORDS.masuk.includes(key)) return {ket:'Masuk',cat:txt.replace(/\d+/g,'').trim(),jml};
  
  // 2. Cek Masuk wajib nama
  if(KEYWORDS.masukNama.includes(key)){
    if(!sisa) return {err:`${key} wajib +nama. Contoh: ${key} Budi ${jml}`};
    return {ket:'Masuk',cat:txt.replace(/\d+/g,'').trim(),jml};
  }

  // 3. Cek Keluar tanpa nama
  if(KEYWORDS.keluar.includes(key)) return {ket:'Keluar',cat:txt.replace(/\d+/g,'').trim(),jml};

  // 4. Cek Keluar wajib nama
  if(KEYWORDS.keluarNama.includes(key)){
    if(!sisa) return {err:`${key} wajib +nama/tujuan. Contoh: ${key} Kos ${jml}`};
    return {ket:'Keluar',cat:txt.replace(/\d+/g,'').trim(),jml};
  }

  return {err:'Keyword tidak valid. Cek hint di bawah'};
}

const renderSaldo=()=>{
  const data=JSON.parse(localStorage.getItem(KEY)||'[]');
  const saldo=data.reduce((s,i)=>s+(i.ket==='Masuk'?i.jml:-i.jml),0);
  document.getElementById('saldo').textContent=showSaldo?`Rp ${saldo.toLocaleString('id-ID')}`:'Rp *******';
}
renderSaldo();

document.getElementById('eye').onclick=()=>{
  showSaldo=!showSaldo;
  renderSaldo();
}

document.getElementById('form').onsubmit=e=>{
  e.preventDefault();
  const txt=inputEl.value.trim();
  if(!txt){showNotif('Input jangan kosong bang','error');return}
  
  const res=parseStrict(txt);
  if(res.err){showNotif(res.err,'error');return}
  
  try{
    const tgl=new Date().toLocaleDateString('id-ID');
    const data=JSON.parse(localStorage.getItem(KEY)||'[]');
    data.push({t:tgl,ket:res.ket,c:res.cat,n:'',jml:res.jml});
    localStorage.setItem(KEY,JSON.stringify(data));
    
    showNotif(`Tersimpan: ${res.ket} Rp ${res.jml.toLocaleString('id-ID')}`,'success');
    inputEl.value='';
    renderSaldo();
  }catch(err){
    showNotif('Gagal simpan. Storage penuh','error');
  }
}
</script>
</body>
</html>
