<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow Pro v2</title>
<style>
:root{--biru:#2563eb;--biru-tua:#1d4ed8;--merah:#ef4444;--hijau:#10b981;--abu:#f3f4f6}
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Arial}
body{background:var(--abu);padding:16px}
.container{max-width:1100px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
h1{color:var(--biru);font-size:24px;font-weight:800}
.btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:14px}
.btn-merah{background:var(--merah);color:#fff}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card h3{font-size:12px;color:#6b7280;font-weight:600;margin-bottom:4px}
.card b{font-size:18px;font-weight:800}
.biru{color:var(--biru)}.merah{color:var(--merah)}
.input-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.input-wrap{display:flex;gap:8px}
#inputData{flex:1;border:2px solid var(--biru);border-radius:10px;padding:12px;font-size:15px}
.btn-biru{background:var(--biru);color:#fff}
.hint{font-size:11px;color:#6b7280;margin-top:6px}
.table-wrap{background:#fff;border-radius:12px;overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;min-width:800px}
th,td{padding:10px;font-size:13px;text-align:center;white-space:nowrap}
thead{background:var(--biru);color:#fff;font-weight:600}
tbody tr:nth-child(even){background:#f9fafb}
tfoot{background:var(--biru-tua);color:#fff;font-weight:800}
.btn-hapus{background:var(--merah);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer}
@media(max-width:640px){.card-grid{grid-template-columns:repeat(2,1fr)} h1{font-size:20px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>💰 Cashflow Pro v2</h1>
    <button class="btn btn-merah" onclick="kosongSemua()">Kosongkan</button>
  </header>

  <div class="card-grid">
    <div class="card"><h3>Saldo Akhir</h3><b class="biru" id="sAkhir">Rp 0</b></div>
    <div class="card"><h3>Total Masuk</h3><b class="biru" id="tMasuk">Rp 0</b></div>
    <div class="card"><h3>Total Keluar</h3><b class="merah" id="tKeluar">Rp 0</b></div>
    <div class="card"><h3>Total Hutang</h3><b class="merah" id="tHutang">Rp 0</b></div>
    <div class="card"><h3>Dipinjamkan</h3><b class="biru" id="tPinjam">Rp 0</b></div>
    <div class="card"><h3>Sisa Hutang</h3><b class="merah" id="sHutang">Rp 0</b></div>
  </div>

  <div class="input-box">
    <div class="input-wrap">
      <input id="inputData" placeholder="Contoh: gaji kantor 5000000" autocomplete="off">
      <button class="btn btn-biru" id="btnSimpan">Simpan</button>
    </div>
    <div class="hint">Keyword: gaji, upah, masuk, beli, bayar, keluar, hutang, minjemin, dikembalikan, bayar</div>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr><th>No</th><th>Tanggal</th><th>Item</th><th>Nama</th><th>Masuk</th><th>Keluar</th><th>Hutang</th><th>Dipinjamkan</th><th>Dikembalikan</th><th>Sisa</th><th>Aksi</th></tr>
      </thead>
      <tbody></tbody>
      <tfoot id="barisTotal"></tfoot>
    </table>
  </div>
</div>

<script>
const KEY = 'cashflow_pro_v2';
const rupiah = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
const KEYWORDS = {masuk:['gaji','upah','masuk'], keluar:['beli','bayar','keluar'], hutang:['hutang'], pinjam:['minjemin','pinjemin'], balik:['dikembalikan','bayar']};

function getData(){ return JSON.parse(localStorage.getItem(KEY) || '[]'); }
function saveData(d){ localStorage.setItem(KEY, JSON.stringify(d)); }

function load(){
  const data = getData();
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = '';
  let saldo=0, tMasuk=0, tKeluar=0, tHutang=0, tPinjam=0, tBalik=0;

  data.forEach((d,i)=>{
    saldo += d.masuk + d.balik + d.hutang - d.keluar - d.pinjam;
    tMasuk += d.masuk + d.balik;
    tKeluar += d.keluar;
    tHutang += d.hutang;
    tPinjam += d.pinjam;
    tBalik += d.balik;

    tb.innerHTML += `<tr>
      <td>${i+1}</td><td>${d.tanggal}</td><td>${d.item}</td><td>${d.nama}</td>
      <td>${rupiah(d.masuk)}</td><td>${rupiah(d.keluar)}</td><td>${rupiah(d.hutang)}</td>
      <td>${rupiah(d.pinjam)}</td><td>${rupiah(d.balik)}</td><td>${rupiah(saldo)}</td>
      <td><button class="btn-hapus" onclick="hapus(${i})">Hapus</button></td>
    </tr>`;
  });

  document.getElementById('barisTotal').innerHTML = `<tr><td colspan="9" style="text-align:left;padding-left:16px">TOTAL SALDO</td><td>${rupiah(saldo)}</td><td></td></tr>`;
  document.getElementById('sAkhir').innerText = rupiah(saldo);
  document.getElementById('tMasuk').innerText = rupiah(tMasuk);
  document.getElementById('tKeluar').innerText = rupiah(tKeluar);
  document.getElementById('tHutang').innerText = rupiah(tHutang);
  document.getElementById('tPinjam').innerText = rupiah(tPinjam);
  document.getElementById('sHutang').innerText = rupiah(tHutang - tBalik); // RUMUS BENER
}

function parseInput(txt){
  txt = txt.toLowerCase().trim();
  const num = Number((txt.match(/(\d[\d\.]*)/)||[0,'0'])[1].replace(/\./g,'')) || 0;
  if(num<=0) return null;

  let type='masuk';
  for(let k in KEYWORDS){ if(KEYWORDS[k].some(w=>txt.includes(w))){ type=k; break; } }

  const nama = txt.replace(new RegExp(KEYWORDS[type].join('|'),'g'),'').replace(/[\d\.]+/g,'').trim() || '-';
  return {type, nama, num};
}

document.getElementById('btnSimpan').onclick = () => {
  const res = parseInput(document.getElementById('inputData').value);
  if(!res) return alert('Format salah!\nContoh: gaji kantor 5000000');

  const data = getData();
  const item = {tanggal:new Date().toLocaleDateString('id-ID'), nama:res.nama, masuk:0, keluar:0, hutang:0, pinjam:0, balik:0, item:res.type};
  if(res.type==='masuk') item.masuk=res.num;
  if(res.type==='keluar') item.keluar=res.num;
  if(res.type==='hutang') item.hutang=res.num;
  if(res.type==='pinjam') item.pinjam=res.num;
  if(res.type==='balik') item.balik=res.num;

  data.push(item);
  saveData(data);
  document.getElementById('inputData').value='';
  load();
};

document.getElementById('inputData').onkeypress = e => { if(e.key==='Enter') document.getElementById('btnSimpan').click(); };

function hapus(i){
  if(!confirm('Hapus data ini?')) return;
  const data = getData();
  data.splice(i,1);
  saveData(data);
  load();
}

function kosongSemua(){
  if(confirm('Yakin hapus semua data?')){ localStorage.removeItem(KEY); load(); }
}
load();
</script>
</body>
</html>
