<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Cashflow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
            margin: 0;
        }
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            grid-column: 2;
            text-align: center;
            color: #004080;
            margin: 0;
            font-size: 22px;
        }
        #kosongBtn {
            grid-column: 3;
            justify-self: end;
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        #kosongBtn:hover {
            background: #b02a37;
        }
        
        .summary, .summary2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .box .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }
        .box .angka {
            font-size: 18px;
            font-weight: bold;
            color: #004080;
        }
        .box .angka.negatif {
            color: #dc3545;
        }

        #backBtn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #004080;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #backBtn:hover {
            background: #002a50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 13px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background: #004080;
            color: white;
            position: sticky;
            top: 0;
        }
        .total-row {
            background: #e8f4ff;
            font-weight: bold;
        }
        .negatif {
            color: red;
        }
        .scroll-box {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Detail Cashflow</h1>
        <button id="kosongBtn">Kosongkan</button>
    </div>

    <!-- 3 Kotak atas -->
    <div class="summary">
        <div class="box">
            <div class="label">Saldo Akhir</div>
            <div class="angka" id="sumSaldo">Rp 0</div>
        </div>
        <div class="box">
            <div class="label">Total Masuk</div>
            <div class="angka" id="sumMasuk">Rp 0</div>
        </div>
        <div class="box">
            <div class="label">Total Keluar</div>
            <div class="angka" id="sumKeluar">Rp 0</div>
        </div>
    </div>

    <!-- 3 Kotak bawah -->
    <div class="summary2">
        <div class="box">
            <div class="label">Total Hutang</div>
            <div class="angka" id="sumHutang">Rp 0</div>
        </div>
        <div class="box">
            <div class="label">Dipinjam/Minjemin</div>
            <div class="angka" id="sumMinjemin">Rp 0</div>
        </div>
        <div class="box">
            <div class="label">Sisa Hutang</div>
            <div class="angka" id="sumSisaHutang">Rp 0</div>
        </div>
    </div>

    <div class="scroll-box">
        <table id="tabelDetail">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Tanggal</th>
                    <th>Item</th>
                    <th>Nama</th>
                    <th>Minjemin</th>
                    <th>Hutang</th>
                    <th>Dikembalikan</th>
                    <th>Pengembalian</th>
                    <th>Masuk</th>
                    <th>Keluar</th>
                    <th>Sisa</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <button id="backBtn">← Kembali</button>

<script>
function formatRupiah(angka) {
    return 'Rp ' + angka.toLocaleString('id-ID');
}

function loadTabel() {
    let data = JSON.parse(localStorage.getItem('dataDetailCashflow')) || [];
    let tbody = document.querySelector('#tabelDetail tbody');
    tbody.innerHTML = '';

    let totalMasuk = 0;
    let totalKeluar = 0;

    data.forEach(row => {
        totalMasuk += row.masuk || 0;
        totalKeluar += row.keluar || 0;

        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${row.no}</td>
            <td>${row.tanggal}</td>
            <td>${row.item}</td>
            <td>${row.nama}</td>
            <td>${row.minjemin}</td>
            <td>${row.hutang? formatRupiah(row.hutang) : ''}</td>
            <td>${row.kembali? formatRupiah(row.kembali) : ''}</td>
            <td>${row.pengembalian? formatRupiah(row.pengembalian) : ''}</td>
            <td>${row.masuk? formatRupiah(row.masuk) : ''}</td>
            <td>${row.keluar? formatRupiah(row.keluar) : ''}</td>
            <td class="${row.sisa < 0? 'negatif' : ''}">${formatRupiah(row.sisa)}</td>
        `;
        tbody.appendChild(tr);
    });

    let sisaTotal = totalMasuk - totalKeluar;
    
    // Hitung hutang + minjemin
    let totalHutang = data.filter(r => r.item === 'Hutang').reduce((a,b) => a + (b.hutang || 0), 0);
    let totalPengembalian = data.filter(r => r.item === 'Kembali').reduce((a,b) => a + (b.pengembalian || 0), 0);
    let sisaHutang = totalHutang - totalPengembalian;

    let totalMinjemin = data.filter(r => r.item === 'Minjemin').reduce((a,b) => a + (b.hutang || 0), 0);

    // Update 3 kotak atas
    document.getElementById('sumSaldo').textContent = formatRupiah(sisaTotal);
    document.getElementById('sumMasuk').textContent = formatRupiah(totalMasuk);
    document.getElementById('sumKeluar').textContent = formatRupiah(totalKeluar);
    if(sisaTotal < 0) document.getElementById('sumSaldo').classList.add('negatif');

    // Update 3 kotak bawah
    document.getElementById('sumHutang').textContent = formatRupiah(totalHutang);
    document.getElementById('sumMinjemin').textContent = formatRupiah(totalMinjemin);
    document.getElementById('sumSisaHutang').textContent = formatRupiah(sisaHutang);
    if(sisaHutang > 0) document.getElementById('sumSisaHutang').classList.add('negatif');

    // Baris TOTAL - cuma 1 kolom Sisa yang diisi
    let trTotal = document.createElement('tr');
    trTotal.className = 'total-row';
    trTotal.innerHTML = `
        <td colspan="10">TOTAL</td>
        <td class="${sisaTotal < 0? 'negatif' : ''}">Rp ${sisaTotal.toLocaleString('id-ID')}</td>
    `;
    tbody.appendChild(trTotal);
}

document.getElementById('kosongBtn').addEventListener('click', function() {
    if(confirm('Yakin hapus semua data? Ini gak bisa dibalikin bang!')) {
        localStorage.removeItem('dataDetailCashflow');
        localStorage.removeItem('saldoCashflow');
        loadTabel();
        alert('Data udah dikosongin!');
    }
});

document.getElementById('backBtn').addEventListener('click', function() {
    window.location.href = 'index.html';
});

window.onload = loadTabel;
</script>
</body>
</html>
