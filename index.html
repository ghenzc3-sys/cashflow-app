<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow</title>
<style>
body{font-family:Segoe UI,Arial;background:#eef2ff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.box{background:#fff;padding:40px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.1);width:400px;text-align:center}
h1{color:#1d4ed8;font-size:32px;margin:0 0 10px}
.emoji{font-size:56px;margin-bottom:10px}
.saldo-wrap{display:flex;gap:8px;margin:15px 0}
.saldo-box{flex:1;border:2px solid #2563eb;border-radius:12px;padding:12px;font-size:18px;font-weight:700;color:#2563eb}
.btn-icon{width:48px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:22px;cursor:pointer}
.input-wrap{display:flex;gap:8px;margin-bottom:8px}
#inputData{flex:1;border:2px solid #2563eb;border-radius:12px;padding:12px;font-size:15px}
.btn{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer}
.btn-hijau{background:#10b981;width:100%;margin-top:15px;font-size:16px}
.keyword{font-size:12px;color:#6b7280;margin-bottom:10px}
</style>
</head>
<body>
<div class="box">
  <h1>Cashflow</h1>
  <div class="emoji">😺</div>
  <label style="font-weight:700">Saldo</label>
  <div class="saldo-wrap">
    <div class="saldo-box" id="saldoText">Rp *******</div>
    <button class="btn-icon" id="btnMata">👁️</button>
  </div>
  <div class="input-wrap">
    <input id="inputData" placeholder="Contoh: gaji 50000">
    <button class="btn" id="btnSimpan">Simpan</button>
  </div>
  <div class="keyword">Keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali</div>
  <button class="btn btn-hijau" id="btnDetail">Detail</button>
</div>

<script>
// KUNCI NO 1: NAMA KEY HARUS SAMA PERSIS
const KEY = 'cashflow_data_v1';
let buka = false;

const rupiah = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');

function getSaldo() {
  const data = JSON.parse(localStorage.getItem(KEY) || '[]');
  return data.reduce((s,d) => s + (d.masuk||0) - (d.keluar||0) - (d.hutang||0) + (d.minjemin||0) - (d.dikembalikan||0) + (d.pengembalian||0), 0);
}

function refreshSaldo() {
  const s = getSaldo();
  document.getElementById('saldoText').innerText = buka? rupiah(s) : 'Rp *******';
  document.getElementById('btnMata').innerText = buka? '🙈' : '👁️';
}

document.getElementById('btnMata').onclick = () => { buka =!buka; refreshSaldo(); }; // INI TOMBOL MATA

document.getElementById('btnSimpan').onclick = () => {
  const txt = document.getElementById('inputData').value.toLowerCase().trim();
  if(!txt) return alert('Isi dulu');
  const num = Number((txt.match(/(\d[\d\.]*)/)||[0,'0'])[1].replace(/\./g,'')) || 0;
  if(num<=0) return alert('Kasih angka. Ex: gaji 50000');

  let j='masuk';
  if(txt.includes('beli')||txt.includes('bayar')) j='keluar';
  else if(txt.includes('hutang')) j='hutang';
  else if(txt.includes('minjemin')) j='minjemin';
  else if(txt.includes('kembali')) j=txt.includes('dikembali')?'dikembalikan':'pengembalian';

  const item = txt.replace(/[\d\.]+/g,'').trim() || j;
  const data = JSON.parse(localStorage.getItem(KEY) || '[]');
  data.push({
    tanggal:new Date().toISOString().split('T')[0], item, nama:'-',
    masuk:j==='masuk'||j==='pengembalian'?num:0, keluar:j==='keluar'||j==='dikembalikan'?num:0,
    hutang:j==='hutang'?num:0, minjemin:j==='minjemin'?num:0,
    dikembalikan:j==='dikembalikan'?num:0, pengembalian:j==='pengembalian'?num:0
  });
  localStorage.setItem(KEY, JSON.stringify(data)); // SIMPAN PAKE KEY YANG SAMA
  document.getElementById('inputData').value='';
  if(buka) refreshSaldo(); // Kalo lagi buka, langsung update angkanya
  alert('Tersimpan '+item+' '+rupiah(num));
};

document.getElementById('btnDetail').onclick = () => location.href='detail.html';
document.getElementById('inputData').onkeypress = e => { if(e.key==='Enter') document.getElementById('btnSimpan').click(); };
refreshSaldo(); // Load pertama
</script>
</body>
</html><!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#e0f2fe,#f4f6f8);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
   .box{background:white;padding:40px 35px;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,.12);width:420px;max-width:95%;text-align:center}
    h1{color:#1e40af;font-size:36px;font-weight:900;margin:0 0 12px 0}
   .emoji{font-size:64px;margin-bottom:15px}
    label{font-weight:bold;color:#374151;display:block;margin:20px 0 10px 0;font-size:16px}
   .saldo-wrap{display:flex;gap:10px;align-items:center;margin-bottom:20px}
   .saldo-box{flex:1;border:2px solid #2563eb;border-radius:14px;padding:14px;font-size:20px;font-weight:800;color:#2563eb;text-align:center;min-height:28px}
   .btn-icon{background:#2563eb;border:none;border-radius:14px;width:52px;height:52px;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;color:white}
   .btn-icon:hover{background:#1e40af}
   .input-wrap{display:flex;gap:10px;align-items:center}
    #inputData{flex:1;border:2px solid #2563eb;border-radius:14px;padding:14px;font-size:16px}
   .btn-simpan{background:#2563eb;color:white;border:none;border-radius:14px;padding:14px 24px;font-weight:bold;cursor:pointer;font-size:16px}
   .btn-simpan:hover{background:#1e40af}
   .keyword{font-size:13px;color:#6b7280;margin:8px 0 20px 0}
   .btn-detail{background:#10b981;color:white;border:none;border-radius:14px;padding:14px 30px;font-weight:bold;font-size:18px;cursor:pointer;width:100%}
   .btn-detail:hover{background:#059669}
  </style>
</head>
<body>
  <div class="box">
    <h1>Cashflow</h1>
    <div class="emoji">😺</div>
    <label>Saldo</label>
    <div class="saldo-wrap">
      <div class="saldo-box" id="saldoText">Rp *******</div>
      <button type="button" class="btn-icon" id="btnMata">👁️</button>
    </div>
    <div class="input-wrap">
      <input type="text" id="inputData" placeholder="Contoh: gaji 50000">
      <button type="button" class="btn-simpan" id="btnSimpan">Simpan</button>
    </div>
    <div class="keyword">Keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali</div>
    <button type="button" class="btn-detail" id="btnDetail">Detail</button>
  </div>

<script>
  // KUNCI UTAMA: Nama key harus sama dengan detail.html
  const STORAGE_KEY = 'cashflowData';
  let saldoTerlihat = false;

  function formatRupiah(angka) {
    return 'Rp ' + Number(angka || 0).toLocaleString('id-ID');
  }

  function hitungTotalSaldo() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let total = 0;
    for (let d of data) {
      total += (Number(d.masuk) || 0);
      total -= (Number(d.keluar) || 0);
      total -= (Number(d.hutang) || 0);
      total += (Number(d.minjemin) || 0);
      total -= (Number(d.dikembalikan) || 0);
      total += (Number(d.pengembalian) || 0);
    }
    return total;
  }

  function updateTampilanSaldo() {
    const total = hitungTotalSaldo();
    const elSaldo = document.getElementById('saldoText');
    const elMata = document.getElementById('btnMata');

    if (saldoTerlihat) {
      elSaldo.textContent = formatRupiah(total);
      elMata.textContent = '🙈';
    } else {
      elSaldo.textContent = 'Rp *******';
      elMata.textContent = '👁️';
    }
  }

  function simpanTransaksi() {
    const input = document.getElementById('inputData').value.trim().toLowerCase();
    if (input === '') {
      alert('Isi dulu bang');
      return;
    }

    const angka = input.match(/(\d[\d\.]*)/);
    const nominal = angka? Number(angka[1].replace(/\./g, '')) : 0;
    if (nominal <= 0) {
      alert('Harus ada nominal angka. Contoh: gaji 50000');
      return;
    }

    let jenis = 'masuk';
    if (input.includes('beli') || input.includes('bayar') || input.includes('keluar')) {
      jenis = 'keluar';
    } else if (input.includes('hutang')) {
      jenis = 'hutang';
    } else if (input.includes('minjemin') || input.includes('pinjemin')) {
      jenis = 'minjemin';
    } else if (input.includes('kembali')) {
      jenis = input.includes('dikembali')? 'dikembalikan' : 'pengembalian';
    } else if (input.includes('gaji') || input.includes('upah')) {
      jenis = 'masuk';
    }

    const namaItem = input.replace(/[\d\.]+/g, '').trim() || jenis;
    const dataLama = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const dataBaru = {
      tanggal: new Date().toISOString().split('T')[0],
      item: namaItem,
      nama: '-',
      masuk: (jenis === 'masuk' || jenis === 'pengembalian')? nominal : 0,
      keluar: (jenis === 'keluar' || jenis === 'dikembalikan')? nominal : 0,
      hutang: (jenis === 'hutang')? nominal : 0,
      minjemin: (jenis === 'minjemin')? nominal : 0,
      dikembalikan: (jenis === 'dikembalikan')? nominal : 0,
      pengembalian: (jenis === 'pengembalian')? nominal : 0
    };

    dataLama.push(dataBaru);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dataLama)); // SIMPAN DISINI

    document.getElementById('inputData').value = '';
    updateTampilanSaldo();
    alert('Berhasil simpan: ' + namaItem + ' + formatRupiah(nominal));
  }

  // Pasang event setelah HTML kebaca semua
  document.getElementById('btnMata').addEventListener('click', function() {
    saldoTerlihat =!saldoTerlihat;
    updateTampilanSaldo();
  });

  document.getElementById('btnSimpan').addEventListener('click', simpanTransaksi);

  document.getElementById('btnDetail').addEventListener('click', function() {
    window.location.href = 'detail.html';
  });

  document.getElementById('inputData').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      simpanTransaksi();
    }
  });

  // Jalankan pertama kali
  updateTampilanSaldo();
</script>
</body>
</html>
