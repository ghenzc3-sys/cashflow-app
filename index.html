<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow</title>
  <style>
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #e0f2fe, #f4f6f8); 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
  .box {
      background: white;
      padding: 40px 35px; /* DIGEDEIN */
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      width: 420px; /* LEBIH LEBAR */
      max-width: 95%;
      text-align: center;
    }
    h1 { 
      color: #1e40af; 
      font-size: 36px; /* DIGEDEIN */
      font-weight: 900; 
      margin: 0 0 12px 0; 
      letter-spacing: 0.5px;
    }
  .emoji { font-size: 64px; margin-bottom: 15px; } /* DIGEDEIN */
    label { 
      font-weight: bold; 
      color: #374151; 
      display: block; 
      margin: 20px 0 10px 0; 
      font-size: 16px;
    }
  .saldo-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }
  .saldo-box {
      flex: 1;
      border: 2px solid #2563eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 20px; /* DIGEDEIN */
      font-weight: 800;
      color: #2563eb;
      text-align: center;
      min-height: 28px;
    }
  .btn-icon {
      background: #2563eb;
      border: none;
      border-radius: 14px;
      width: 52px; /* DIGEDEIN */
      height: 52px;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
  .btn-icon:hover { background: #1e40af; }
  .input-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #inputData {
      flex: 1;
      border: 2px solid #2563eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px; /* DIGEDEIN */
    }
  .btn-simpan {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }
  .btn-simpan:hover { background: #1e40af; }
  .keyword {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
      margin-bottom: 20px;
    }
  .btn-detail {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 30px;
      font-weight: bold;
      font-size: 18px; /* DIGEDEIN */
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }
  .btn-detail:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cashflow</h1>
    <div class="emoji">😺</div>
    
    <label>Saldo</label>
    <div class="saldo-wrap">
      <div class="saldo-box" id="saldoText">Rp *******</div>
      <button class="btn-icon" id="btnMata" onclick="toggleSaldo()">👁️</button>
    </div>

    <div class="input-wrap">
      <input type="text" id="inputData" placeholder="isi disini">
      <button class="btn-simpan" onclick="simpanData()">Simpan</button>
    </div>
    <div class="keyword">Keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali</div>

    <button class="btn-detail" onclick="window.location.href='detail.html'">Detail</button>
  </div>

  <script>
    let showSaldo = false;

    function formatRupiah(num) {
      return 'Rp ' + Number(num || 0).toLocaleString('id-ID');
    }

    function hitungSaldo() {
      const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');
      let saldo = 0;
      data.forEach(d => {
        saldo += (Number(d.masuk) || 0) - (Number(d.keluar) || 0) - (Number(d.hutang) || 0) + (Number(d.minjemin) || 0) - (Number(d.dikembalikan) || 0) + (Number(d.pengembalian) || 0);
      });
      return saldo;
    }

    function updateSaldo() {
      const saldo = hitungSaldo();
      const saldoText = document.getElementById('saldoText');
      const btnMata = document.getElementById('btnMata');
      
      if (showSaldo) {
        saldoText.textContent = formatRupiah(saldo);
        btnMata.textContent = '🙈'; // Mata ketutup
      } else {
        saldoText.textContent = 'Rp *******';
        btnMata.textContent = '👁️'; // Mata buka
      }
    }

    function toggleSaldo() {
      showSaldo =!showSaldo; // INI KUNCINYA: tombol mata fungsi
      updateSaldo();
    }

    function simpanData() {
      const text = document.getElementById('inputData').value.trim().toLowerCase();
      if (!text) {
        alert('Isi dulu bang');
        return;
      }

      const angkaMatch = text.match(/(\d[\d\.]*)/);
      const nominal = angkaMatch? Number(angkaMatch[1].replace(/\./g, '')) : 0;

      if (nominal <= 0) {
        alert('Harus ada nominal. Contoh: gaji 50000');
        return;
      }

      let jenis = 'masuk';
      if (text.includes('beli') || text.includes('bayar') || text.includes('keluar')) jenis = 'keluar';
      else if (text.includes('hutang')) jenis = 'hutang';
      else if (text.includes('minjemin') || text.includes('pinjemin')) jenis = 'minjemin';
      else if (text.includes('kembali') || text.includes('balik')) {
        if (text.includes('dikembali')) jenis = 'dikembalikan';
        else jenis = 'pengembalian';
      }
      else if (text.includes('gaji') || text.includes('upah')) jenis = 'masuk';

      const item = text.replace(/[\d\.]+/g, '').trim();

      const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');

      data.push({
        tanggal: new Date().toISOString().split('T')[0],
        item: item || jenis,
        nama: '-',
        masuk: jenis === 'masuk' || jenis === 'pengembalian'? nominal : 0,
        keluar: jenis === 'keluar' || jenis === 'dikembalikan'? nominal : 0,
        hutang: jenis === 'hutang'? nominal : 0,
        minjemin: jenis === 'minjemin'? nominal : 0,
        dikembalikan: jenis === 'dikembalikan'? nominal : 0,
        pengembalian: jenis === 'pengembalian'? nominal : 0
      });

      localStorage.setItem('cashflowData', JSON.stringify(data)); // KEY SAMA DENGAN DETAIL
      
      document.getElementById('inputData').value = '';
      updateSaldo(); // Update saldo langsung
      alert('Tersimpan: ' + item + ' + formatRupiah(nominal));
    }

    // Enter untuk simpan
    document.getElementById('inputData').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') simpanData();
    });

    // Load pertama kali
    updateSaldo();
  </script>
</body>
</html>
