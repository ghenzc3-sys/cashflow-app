<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#3b82f6 0%,#1d4ed8 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
 .card{background:#fff;border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,.15);padding:24px;width:100%;max-width:380px;text-align:center}
  .icon{font-size:40px;margin-bottom:8px}
  h1{margin:0 0 20px;font-size:28px;color:#2563eb;font-weight:800}
  label{font-size:12px;color:#6b7280;letter-spacing:1px;font-weight:600}
 .saldo-box{display:flex;align-items:center;gap:8px;margin:10px 0 16px}
 .saldo{flex:1;background:#f0f9ff;border:2px solid #38bdf8;border-radius:14px;padding:14px;font-size:20px;font-weight:700;color:#2563eb}
  .eye{width:48px;height:48px;border-radius:50%;background:#0ea5e9;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px}
  .input-wrap{display:flex;gap:8px}
  input{flex:1;padding:14px 16px;border-radius:14px;border:1.5px solid #e5e7eb;font-size:14px;outline:none}
  input:focus{border-color:#38bdf8}
  .btn-simpan{padding:14px 20px;border-radius:14px;border:0;background:#0ea5e9;color:#fff;font-weight:700;cursor:pointer}
  .petunjuk{font-size:12px;color:#6b7280;text-align:left;margin:12px 4px 0;line-height:1.6}
  .btn-detail{margin-top:14px;width:100%;padding:14px;border-radius:14px;border:0;background:#2dd4bf;color:#fff;font-weight:700;font-size:15px;cursor:pointer}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">💵</div>
    <h1>Cashflow</h1>

    <label>SALDO SAAT INI</label>
    <div class="saldo-box">
      <div class="saldo" id="saldo">Rp *******</div>
      <div class="eye" id="btnEye">👁️</div>
    </div>

    <div class="input-wrap">
      <input id="inputTxt" placeholder="isi dengan benar dan teliti">
      <button class="btn-simpan" id="btnSimpan">Simpan</button>
    </div>

    <div class="petunjuk">
      Masuk: gaji, upah, dapat, hutang+nama<br>
      Keluar: beli, bayar+nama, nyaur+nama, jajan
    </div>

    <button class="btn-detail" onclick="location.href='detail.html'">Lihat Detail →</button>
  </div>

<script>
/* ========= SETTINGS ========= */
const KEY = 'cashflow'; // <-- INI KUNCINYA, HARUS SAMA DENGAN DETAIL
const FMT = new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0});

/* ========= STATE ========= */
let data = JSON.parse(localStorage.getItem(KEY)) || [];
let showSaldo = false;

const $ = s => document.querySelector(s);

/* ========= INIT ========= */
renderSaldo();

/* ========= EVENTS ========= */
$('#btnEye').addEventListener('click', ()=>{
  showSaldo = !showSaldo;
  renderSaldo();
});

$('#btnSimpan').addEventListener('click', ()=>{
  const txt = $('#inputTxt').value.trim().toLowerCase();
  if(!txt){ alert('Isi dulu bang'); return; }

  // Logika Keyword dari petunjuk kamu
  let jenis = 'out'; 
  let nama = txt;

  if(txt.includes('gaji')||txt.includes('upah')||txt.includes('dapat')||txt.includes('hutang')){
    jenis='in';
  }
  if(txt.includes('beli')||txt.includes('bayar')||txt.includes('nyaur')||txt.includes('jajan')){
    jenis='out';
  }

  const angka = txt.match(/\d+/g);
  if(!angka){ alert('Masukkan nominal juga. Contoh: gaji 500000'); return; }
  const jumlah = Number(angka.join(''));

  const catatan = txt.replace(/\d+/g,'').trim();
  const tgl = new Date().toISOString().slice(0,10);
  const kategori = catatan.split(' ')[0] || 'Lainnya';

  data.push({id:crypto.randomUUID(), tgl, jenis, kategori, jumlah, catatan});
  localStorage.setItem(KEY, JSON.stringify(data)); // <-- SIMPAN PAKE KEY SAMA
  $('#inputTxt').value='';
  renderSaldo();
});

/* ========= RENDER ========= */
function renderSaldo(){
  const sumIn = data.filter(d=>d.jenis==='in').reduce((a,b)=>a+b.jumlah,0);
  const sumOut = data.filter(d=>d.jenis==='out').reduce((a,b)=>a+b.jumlah,0);
  const saldo = sumIn - sumOut;
  $('#saldo').textContent = showSaldo ? FMT.format(saldo) : 'Rp *******';
  $('#btnEye').textContent = showSaldo ? '🙈' : '👁️';
}
</script>
</body>
</html>
