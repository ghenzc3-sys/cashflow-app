
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Cashflow V13.8.3</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body{font-family:'Inter',sans-serif;background:#f1f5f9}
  th{background:#2563eb;color:#fff;font-weight:600;font-size:13px}
  td{font-size:13px}
.btn-del{background:#ef4444;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700}
.btn-del:hover{background:#dc2626}
.btn-top{padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700}
.btn-kembali{background:#3b82f6;color:#fff} /* Biru */
.btn-kosongkan{background:#ef4444;color:#fff} /* Merah */
</style>
</head>
<body class="p-3">

<div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-4">
  
  <!-- HEADER ATAS = UNDO REDO EXPORT DI SINI -->
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <span class="text-xl">📊</span>
      <h1 class="text-lg font-bold text-slate-800">Detail Cashflow V13.8.3</h1>
    </div>
    <div class="flex gap-1">
      <button id="btnUndo" class="btn-top bg-slate-500 text-white">↶</button>
      <button id="btnRedo" class="btn-top bg-slate-500 text-white">↷</button>
      <button id="btnExport" class="btn-top bg-green-600 text-white">Export</button>
    </div>
  </div>

  <!-- CARDS KECIL -->
  <div class="grid grid-cols-5 gap-2 mb-3 text-center">
    <div class="bg-slate-100 rounded-lg p-2"><p class="text-xs text-slate-600">Saldo Kas</p><p id="saldo" class="text-sm font-bold text-blue-600">Rp 0</p></div>
    <div class="bg-slate-100 rounded-lg p-2"><p class="text-xs text-slate-600">Total Masuk</p><p id="masuk" class="text-sm font-bold text-blue-300">Rp 0</p></div>
    <div class="bg-slate-100 rounded-lg p-2"><p class="text-xs text-slate-600">Total Keluar</p><p id="keluar" class="text-sm font-bold text-red-400">Rp 0</p></div>
    <div class="bg-green-100 rounded-lg p-2"><p class="text-xs text-slate-600">Piutang</p><p id="piutang" class="text-sm font-bold text-green-600">Rp 0</p></div>
    <div class="bg-orange-100 rounded-lg p-2"><p class="text-xs text-slate-600">Utang</p><p id="utang" class="text-sm font-bold text-orange-600">Rp 0</p></div>
  </div>

  <!-- UANG HARIAN + TOMBOL KEMBALI/KOSONGKAN -->
  <div class="bg-violet-100 rounded-lg p-2 flex justify-between items-center mb-3">
    <div class="text-center w-full">
      <p class="text-xs text-slate-600">Uang Harian</p>
      <p id="harian" class="text-sm font-bold text-violet-700">Rp 0</p>
    </div>
    <div class="flex gap-1 ml-2">
      <button id="btnKosongkan" class="btn-top btn-kosongkan">🗑</button>
      <button id="btnKembali" class="btn-top btn-kembali">←</button>
    </div>
  </div>

  <!-- TABEL BIRU -->
  <div class="overflow-x-auto rounded-lg border-blue-500">
    <table class="w-full">
      <thead>
        <tr>
          <th class="p-2">No</th>
          <th class="p-2">Tgl</th>
          <th class="p-2">Ket</th>
          <th class="p-2">Catatan</th>
          <th class="p-2">Nama</th>
          <th class="p-2 text-right">Nominal</th>
          <th class="p-2 text-right">Sisa Harian</th>
          <th class="p-2 text-center">Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody" class="bg-white"></tbody>
      <tfoot>
        <tr class="bg-blue-600 text-white font-bold">
          <td colspan="7" class="p-2 text-right">TOTAL SALDO KAS</td>
          <td id="totalSaldoFoot" class="p-2 text-right">Rp 0</td>
        </tr>
      </tfoot>
    </table>
  </div>

</div>

<script>
// ====== DATA DUMMY KAMU ======
let data = [
  {tanggal:'2026-09-04', ket:'Masuk', catatan:'Gaji', nominal:5000000},
  {tanggal:'2026-09-04', ket:'Keluar', catatan:'Makan', nominal:50000},
  {tanggal:'2026-09-04', ket:'Masuk', catatan:'Hutang pak joko', nominal:50000},
  {tanggal:'2026-09-04', ket:'Keluar', catatan:'Nyaur pak joko', nominal:5000},
  {tanggal:'2026-09-04', ket:'Keluar', catatan:'Dipinjam bu eni', nominal:60000},
  {tanggal:'2026-09-04', ket:'Masuk', catatan:'Kembali bu eni', nominal:5000},
];

// ====== HISTORY UNDO/REDO ======
let history = [JSON.stringify(data)];
let historyIndex = 0;
let isNavigatingHistory = false;

const btnUndo = document.getElementById('btnUndo');
const btnRedo = document.getElementById('btnRedo');
const btnExport = document.getElementById('btnExport');
const btnKembali = document.getElementById('btnKembali');
const btnKosongkan = document.getElementById('btnKosongkan');

function saveState(){
  if(isNavigatingHistory) return;
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.stringify(data));
  historyIndex++;
  updateBtn();
}

function updateBtn(){
  btnUndo.disabled = historyIndex <= 0;
  btnRedo.disabled = historyIndex >= history.length - 1;
}

btnUndo.onclick = ()=>{
  if(historyIndex > 0){
    isNavigatingHistory = true;
    historyIndex--;
    data = JSON.parse(history[historyIndex]);
    render();
    isNavigatingHistory = false;
    updateBtn();
  }
}

btnRedo.onclick = ()=>{
  if(historyIndex < history.length - 1){
    isNavigatingHistory = true;
    historyIndex++;
    data = JSON.parse(history[historyIndex]);
    render();
    isNavigatingHistory = false;
    updateBtn();
  }
}

// TOMBOL KEMBALI = UNDO
btnKembali.onclick = ()=>{ btnUndo.click(); }

// TOMBOL KOSONGKAN = HAPUS SEMUA DATA
btnKosongkan.onclick = ()=>{
  if(confirm('Yakin kosongkan semua data?')){
    data = [];
    saveState();
    render();
  }
}

// ====== RENDER TABEL ======
function render(){
  const tbody = document.getElementById('tbody');
  if(history.length === 1 &&!isNavigatingHistory) saveState(); // Simpan state awal

  tbody.innerHTML = '';
  let sisaHarian = 0;
  
  data.forEach((r,i)=>{
    if(r.ket==='Masuk') sisaHarian += r.nominal;
    else sisaHarian -= r.nominal;

    const warnaKet = r.ket==='Masuk'? 'text-blue-600' : 'text-red-600';
    const warnaNom = r.ket==='Masuk'? 'text-blue-600' : 'text-red-600';

    const tr = document.createElement('tr');
    tr.className = i%2? 'bg-slate-50' : 'bg-white';
    tr.innerHTML = `
      <td class="p-2 text-center">${i+1}</td>
      <td class="p-2">${r.tanggal.split('-').reverse().join('/')}</td>
      <td class="p-2 font-semibold ${warnaKet}">${r.ket}</td>
      <td class="p-2">${r.catatan}</td>
      <td class="p-2 text-center">-</td>
      <td class="p-2 text-right font-semibold ${warnaNom}">Rp ${r.nominal.toLocaleString('id-ID')}</td>
      <td class="p-2 text-right font-semibold ${i===data.length-1?'bg-green-100':''}">Rp ${sisaHarian.toLocaleString('id-ID')}</td>
      <td class="p-2 text-center"><button class="btn-del" onclick="hapus(${i})">X</button></td>
    `;
    tbody.appendChild(tr);
  });
  updateCards();
}

function hapus(i){
  data.splice(i,1);
  saveState();
  render();
}

// ====== UPDATE CARDS LOGIKA V13.7 TETEP = INCLUDES ======
function updateCards(){
  let masuk=0, keluar=0, piutang=0, utang=0, sisaHarian=0;
  data.forEach(r=>{
    if(r.ket==='Masuk'){masuk+=r.nominal; sisaHarian+=r.nominal;}
    if(r.ket==='Keluar'){keluar+=r.nominal; sisaHarian-=r.nominal;}
    let c = r.catatan.toLowerCase().trim();
    let v = r.nominal;
    if(c.includes('hutang')) utang += v;
    if(c.includes('nyaur')) utang -= v;
    if(c.includes('dipinjam')) piutang += v;
    if(c.includes('kembali')) piutang -= v;
  });
  
  document.getElementById('saldo').textContent = 'Rp '+(masuk-keluar).toLocaleString('id-ID');
  document.getElementById('masuk').textContent = 'Rp '+masuk.toLocaleString('id-ID');
  document.getElementById('keluar').textContent = 'Rp '+keluar.toLocaleString('id-ID');
  document.getElementById('piutang').textContent = 'Rp '+piutang.toLocaleString('id-ID');
  document.getElementById('utang').textContent = 'Rp '+utang.toLocaleString('id-ID');
  document.getElementById('harian').textContent = 'Rp '+sisaHarian.toLocaleString('id-ID');
  document.getElementById('totalSaldoFoot').textContent = 'Rp '+(masuk-keluar).toLocaleString('id-ID');
}

// ====== EXPORT EXCEL ======
btnExport.onclick = ()=>{
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Cashflow");
  XLSX.writeFile(wb, "Cashflow_V13.8.3.xlsx");
}

render();
updateBtn();
</script>
</body>
</html>
