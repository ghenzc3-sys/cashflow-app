<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Cashflow</title>
<style>
body{font-family:Segoe UI,Arial;background:#eef2ff;margin:0;padding:20px}
.wrap{max-width:1100px;margin:0 auto}
h1{color:#1d4ed8;text-align:center;margin:0 0 16px;font-size:24px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.06);border:1px solid #e5e7eb}
.card h3{margin:0;font-size:12px;color:#6b7280;font-weight:600}
.card b{display:block;margin-top:4px;font-size:16px;color:#111827;font-weight:700}
.total-card{background:#2563eb;color:#fff;grid-column:1/-1}
.total-card h3,.total-card b{color:#fff;font-size:18px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.06);margin-top:12px}
th,td{padding:10px;border-bottom:1px solid #f3f4f6;font-size:13px;text-align:center}
th{background:#2563eb;color:#fff;font-weight:600}
.btn{padding:10px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:700;margin-right:8px;font-size:14px}
.btn-biru{background:#2563eb;color:#fff}
.btn-merah{background:#ef4444;color:#fff}
.table-wrap{overflow-x:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1>Detail Cashflow</h1>
  <div class="cards">
    <div class="card"><h3>Saldo Akhir</h3><b id="sAkhir">Rp 0</b></div>
    <div class="card"><h3>Total Masuk</h3><b id="tMasuk">Rp 0</b></div>
    <div class="card"><h3>Total Keluar</h3><b id="tKeluar">Rp 0</b></div>
    <div class="card"><h3>Total Hutang</h3><b id="tHutang">Rp 0</b></div>
    <div class="card"><h3>Dipinjamkan</h3><b id="tPinjam">Rp 0</b></div>
    <div class="card"><h3>Sisa Hutang</h3><b id="sHutang">Rp 0</b></div>
    <div class="card total-card"><h3>TOTAL AKHIR</h3><b id="tTotal">Rp 0</b></div>
  </div>
  <div style="margin-bottom:12px">
    <button class="btn btn-biru" onclick="location.href='index.html'">Kembali</button>
    <button class="btn btn-merah" onclick="kosong()">Hapus Semua</button>
  </div>
  <div class="table-wrap">
    <table id="tbl">
      <thead><tr><th>No</th><th>Tanggal</th><th>Item</th><th>Nama</th><th>Minjemin</th><th>Hutang</th><th>Dikembalikan</th><th>Pengembalian</th><th>Masuk</th><th>Keluar</th><th>Saldo</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script>
const KEY = 'cashflow_data_v1';
const rupiah = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
function load() {
  const data = JSON.parse(localStorage.getItem(KEY) || '[]');
  const tb = document.querySelector('#tbl tbody'); tb.innerHTML='';
  let saldo=0, totalMasuk=0, totalKeluar=0, totalHutang=0, totalPinjam=0;
  data.forEach((d,i)=>{
    saldo += (d.masuk||0) + (d.pengembalian||0) + (d.minjemin||0) - (d.keluar||0) - (d.hutang||0) - (d.dikembalikan||0);
    totalMasuk += (d.masuk||0) + (d.pengembalian||0);
    totalKeluar += (d.keluar||0) + (d.dikembalikan||0);
    totalHutang += d.hutang||0; totalPinjam += d.minjemin||0;
    tb.innerHTML += `<tr><td>${i+1}</td><td>${d.tanggal}</td><td>${d.item}</td><td>${d.nama}</td><td>${rupiah(d.minjemin)}</td><td>${rupiah(d.hutang)}</td><td>${rupiah(d.dikembalikan)}</td><td>${rupiah(d.pengembalian)}</td><td>${rupiah(d.masuk)}</td><td>${rupiah(d.keluar)}</td><td>${rupiah(saldo)}</td></tr>`;
  });
  document.getElementById('sAkhir').innerText = rupiah(saldo);
  document.getElementById('tMasuk').innerText = rupiah(totalMasuk);
  document.getElementById('tKeluar').innerText = rupiah(totalKeluar);
  document.getElementById('tHutang').innerText = rupiah(totalHutang);
  document.getElementById('tPinjam').innerText = rupiah(totalPinjam);
  document.getElementById('sHutang').innerText = rupiah(totalHutang-totalPinjam);
  document.getElementById('tTotal').innerText = rupiah(saldo);
}
function kosong(){ if(confirm('Hapus semua data?')){ localStorage.removeItem(KEY); load(); }
load();
</script>
</body>
</html>
