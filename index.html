<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f4f6f8; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
   .box {
      background: white;
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
    h1 { 
      color: #1e40af; 
      font-size: 28px; 
      font-weight: 900; 
      margin: 0 0 10px 0; 
    }
   .emoji { font-size: 48px; margin-bottom: 10px; }
    label { 
      font-weight: bold; 
      color: #333; 
      display: block; 
      margin: 15px 0 8px 0; 
    }
   .saldo-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 15px;
    }
   .saldo-box {
      flex: 1;
      border: 2px solid #2563eb;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      color: #2563eb;
    }
   .btn-icon {
      background: #2563eb;
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      font-size: 22px;
    }
   .input-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #inputData {
      flex: 1;
      border: 2px solid #2563eb;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
    }
   .btn-simpan {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
    }
   .keyword {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
      margin-bottom: 15px;
    }
   .btn-detail {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 30px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cashflow</h1>
    <div class="emoji">😺</div>
    
    <label>Saldo</label>
    <div class="saldo-wrap">
      <div class="saldo-box" id="saldoText">Rp *******</div>
      <button class="btn-icon" onclick="toggleSaldo()">👁️</button>
    </div>

    <div class="input-wrap">
      <input type="text" id="inputData" placeholder="isi disini">
      <button class="btn-simpan" onclick="simpanData()">Simpan</button>
    </div>
    <div class="keyword">Keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali</div>

    <button class="btn-detail" onclick="window.location.href='detail.html'">Detail</button>
  </div>

  <script>
    let showSaldo = false;

    function formatRupiah(num) {
      return 'Rp ' + Number(num || 0).toLocaleString('id-ID');
    }

    function hitungSaldo() {
      const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');
      let saldo = 0;
      data.forEach(d => {
        saldo += (d.masuk || 0) - (d.keluar || 0) - (d.hutang || 0) + (d.minjemin || 0) - (d.dikembalikan || 0) + (d.pengembalian || 0);
      });
      return saldo;
    }

    function updateSaldo() {
      const saldo = hitungSaldo();
      document.getElementById('saldoText').textContent = showSaldo? formatRupiah(saldo) : 'Rp *******';
    }

    function toggleSaldo() {
      showSaldo =!showSaldo;
      updateSaldo();
    }

    function simpanData() {
      const text = document.getElementById('inputData').value.trim().toLowerCase();
      if (!text) {
        alert('Isi dulu bang');
        return;
      }

      // Ambil angka dari teks
      const angkaMatch = text.match(/(\d[\d\.]*)/);
      const nominal = angkaMatch? Number(angkaMatch[1].replace(/\./g, '')) : 0;

      if (nominal <= 0) {
        alert('Harus ada nominal. Contoh: gaji 50000');
        return;
      }

      // Deteksi keyword
      let jenis = 'masuk';
      if (text.includes('beli') || text.includes('bayar') || text.includes('keluar')) jenis = 'keluar';
      else if (text.includes('hutang')) jenis = 'hutang';
      else if (text.includes('minjemin') || text.includes('pinjemin')) jenis = 'minjemin';
      else if (text.includes('kembali') || text.includes('balik')) {
        if (text.includes('dikembali')) jenis = 'dikembalikan';
        else jenis = 'pengembalian';
      }
      else if (text.includes('gaji') || text.includes('upah')) jenis = 'masuk';

      // Ambil item = teks tanpa angka
      const item = text.replace(/[\d\.]+/g, '').trim();

      // Ambil data lama
      const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');

      // Tambah data baru format sama kayak detail.html
      data.push({
        tanggal: new Date().toISOString().split('T')[0],
        item: item || jenis,
        nama: '-',
        masuk: jenis === 'masuk' || jenis === 'pengembalian'? nominal : 0,
        keluar: jenis === 'keluar' || jenis === 'dikembalikan'? nominal : 0,
        hutang: jenis === 'hutang'? nominal : 0,
        minjemin: jenis === 'minjemin'? nominal : 0,
        dikembalikan: jenis === 'dikembalikan'? nominal : 0,
        pengembalian: jenis === 'pengembalian'? nominal : 0
      });

      // Simpan dengan key 'cashflowData' Biar nyambung ke detail.html
      localStorage.setItem('cashflowData', JSON.stringify(data));
      
      document.getElementById('inputData').value = '';
      updateSaldo();
      alert('Tersimpan: ' + item + ' + formatRupiah(nominal));
    }

    // Load pertama kali
    updateSaldo();
  </script>
</body>
</html>
