<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Cashflow V13.7</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body{font-family:'Inter',sans-serif;background:#f8fafc}
 .card{box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1)}
 .btn-del{background:#ef4444;color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
 .btn-del:hover{background:#dc2626}
 .btn-undo{background:#64748b;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600}
 .btn-undo:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body class="p-4 md:p-6">

<div class="max-w-7xl mx-auto">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold text-slate-800">Detail Cashflow V13.7</h1>
    <div class="flex gap-2">
      <button id="btnUndo" class="btn-undo">↶ Undo</button>
      <button id="btnRedo" class="btn-undo">↷ Redo</button>
      <button id="btnExport" class="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold">Export Excel</button>
    </div>
  </div>

  <!-- Cards -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
    <div class="card bg-white p-4 rounded-xl"><p class="text-sm text-slate-500">Saldo Kas</p><p id="saldo" class="text-xl font-bold text-slate-800">Rp 0</p></div>
    <div class="card bg-white p-4 rounded-xl"><p class="text-sm text-slate-500">Uang Masuk</p><p id="masuk" class="text-xl font-bold text-green-600">Rp 0</p></div>
    <div class="card bg-white p-4 rounded-xl"><p class="text-sm text-slate-500">Uang Keluar</p><p id="keluar" class="text-xl font-bold text-red-600">Rp 0</p></div>
    <div class="card bg-white p-4 rounded-xl"><p class="text-sm text-slate-500">Piutang</p><p id="piutang" class="text-xl font-bold text-green-600">Rp 0</p></div>
    <div class="card bg-white p-4 rounded-xl"><p class="text-sm text-slate-500">Utang</p><p id="utang" class="text-xl font-bold text-orange-600">Rp 0</p></div>
  </div>

  <div class="card bg-white p-4 rounded-xl mb-6">
    <p class="text-sm text-slate-500">Uang Harian</p>
    <p id="harian" class="text-2xl font-bold text-blue-600">Rp 0</p>
  </div>

  <!-- Tabel -->
  <div class="card bg-white rounded-xl overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-100 text-slate-600">
        <tr>
          <th class="p-3 text-left">Tanggal</th>
          <th class="p-3 text-left">Keterangan</th>
          <th class="p-3 text-left">Catatan</th>
          <th class="p-3 text-right">Nominal</th>
          <th class="p-3 text-right">Sisa Harian</th>
          <th class="p-3 text-center">Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
// ====== DATA DUMMY KAMU ======
let data = [
  {tanggal:'2026-09-04', ket:'Masuk', catatan:'Gaji', nominal:5000000},
  {tanggal:'2026-09-04', ket:'Keluar', catatan:'Makan', nominal:50000},
  {tanggal:'2026-09-04', ket:'Masuk', catatan:'Hutang pak joko', nominal:50000},
  {tanggal:'2026-09-04', ket:'Keluar', catatan:'Nyaur pak joko', nominal:5000},
  {tanggal:'2026-09-04', ket:'Keluar', catatan:'Dipinjam bu eni', nominal:60000},
  {tanggal:'2026-09-04', ket:'Masuk', catatan:'Kembali bu eni', nominal:5000},
];

// ====== HISTORY UNTUK UNDO/REDO ======
let history = [JSON.stringify(data)];
let historyIndex = 0;
let isNavigatingHistory = false; // KUNCI ANTI KACAU

const tbody = document.getElementById('tbody');
const btnUndo = document.getElementById('btnUndo');
const btnRedo = document.getElementById('btnRedo');

function saveState(){
  if(isNavigatingHistory) return; // JANGAN SIMPAN SAAT UNDO/REDO
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.stringify(data));
  historyIndex++;
  updateUndoRedoBtn();
}

function updateUndoRedoBtn(){
  btnUndo.disabled = historyIndex <= 0;
  btnRedo.disabled = historyIndex >= history.length - 1;
}

btnUndo.onclick = ()=>{
  if(historyIndex > 0){
    isNavigatingHistory = true;
    historyIndex--;
    data = JSON.parse(history[historyIndex]);
    render();
    isNavigatingHistory = false;
    updateUndoRedoBtn();
  }
}

btnRedo.onclick = ()=>{
  if(historyIndex < history.length - 1){
    isNavigatingHistory = true;
    historyIndex++;
    data = JSON.parse(history[historyIndex]);
    render();
    isNavigatingHistory = false;
    updateUndoRedoBtn();
  }
}

// ====== RENDER TABEL ======
function render(){
  tbody.innerHTML = '';
  let sisaHarian = 0;
  
  data.forEach((r,i)=>{
    if(r.ket==='Masuk') sisaHarian += r.nominal;
    else sisaHarian -= r.nominal;

    const tr = document.createElement('tr');
    tr.className = 'border-b hover:bg-slate-50';
    tr.innerHTML = `
      <td class="p-3">${r.tanggal}</td>
      <td class="p-3">${r.ket}</td>
      <td class="p-3">${r.catatan}</td>
      <td class="p-3 text-right font-semibold">Rp ${r.nominal.toLocaleString('id-ID')}</td>
      <td class="p-3 text-right font-semibold">Rp ${sisaHarian.toLocaleString('id-ID')}</td>
      <td class="p-3 text-center"><button class="btn-del" onclick="hapus(${i})">X</button></td>
    `;
    tbody.appendChild(tr);
  });
  updateCards();
}

function hapus(i){
  data.splice(i,1);
  saveState(); // SIMPAN SETELAH HAPUS
  render();
}

// ====== UPDATE CARDS V13.7 - PAKAI INCLUDES ======
function updateCards(){
  let masuk=0, keluar=0, piutang=0, utang=0, sisaHarian=0;
  
  data.forEach(r=>{
    if(r.ket==='Masuk'){
      masuk+=r.nominal;
      sisaHarian+=r.nominal;
    }
    if(r.ket==='Keluar'){
      keluar+=r.nominal;
      sisaHarian-=r.nominal;
    }
    
    let c = r.catatan.toLowerCase().trim();
    let v = r.nominal;
    // KUNCI: pake includes biar "Hutang pak joko" kehitung
    if(c.includes('hutang')) utang += v;
    if(c.includes('nyaur')) utang -= v;
    if(c.includes('dipinjam')) piutang += v;
    if(c.includes('kembali')) piutang -= v;
  });
  
  document.getElementById('saldo').textContent = 'Rp '+(masuk-keluar).toLocaleString('id-ID');
  document.getElementById('masuk').textContent = 'Rp '+masuk.toLocaleString('id-ID');
  document.getElementById('keluar').textContent = 'Rp '+keluar.toLocaleString('id-ID');
  document.getElementById('piutang').textContent = 'Rp '+piutang.toLocaleString('id-ID');
  document.getElementById('utang').textContent = 'Rp '+utang.toLocaleString('id-ID');
  document.getElementById('harian').textContent = 'Rp '+sisaHarian.toLocaleString('id-ID');
}

// ====== EXPORT EXCEL ======
document.getElementById('btnExport').onclick = ()=>{
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Cashflow");
  XLSX.writeFile(wb, "Cashflow_V13.7.xlsx");
}

// ====== INIT ======
render();
updateUndoRedoBtn();
</script>
</body>
</html>
