<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Cashflow</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:20px;margin:0}
h1{text-align:center;color:#2563eb;font-size:32px;font-weight:900;margin:0 0 20px}
.btn-kanan{float:right;background:#dc2626;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:700}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.card{padding:15px;border-radius:12px;text-align:center;font-weight:700;color:#fff}
.biru{background:#2563eb}.merah{background:#dc2626}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.1)}
th,td{border:1px solid #ddd;padding:8px;text-align:center;font-size:14px}
th{background:#2563eb;color:#fff} tfoot td{font-weight:900;background:#2563eb;color:#fff}
.btn{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:700}
.btn-biru{background:#2563eb;color:#fff}
</style>
</head>
<body>
<h1>Detail Cashflow <button class="btn-kanan" onclick="kosong()">Kosongkan</button></h1>
<div class="summary">
  <div class="card biru"><div>Saldo Akhir</div><div id="sAkhir">Rp 0</div></div>
  <div class="card biru"><div>Total Masuk</div><div id="tMasuk">Rp 0</div></div>
  <div class="card merah"><div>Total Keluar</div><div id="tKeluar">Rp 0</div></div>
  <div class="card merah"><div>Total Hutang</div><div id="tHutang">Rp 0</div></div>
  <div class="card biru"><div>Dipinjam</div><div id="tPinjam">Rp 0</div></div>
  <div class="card merah"><div>Sisa Hutang</div><div id="sHutang">Rp 0</div></div>
</div>
<table id="tbl"><thead><tr><th>No</th><th>Tanggal</th><th>Item</th><th>Nama</th><th>Minjemin</th><th>Hutang</th><th>Dikembalikan</th><th>Pengembalian</th><th>Masuk</th><th>Keluar</th><th>Sisa</th></tr></thead>
<tbody></tbody>
<tfoot><tr><td colspan="9" style="text-align:right">TOTAL</td><td id="tTotal">Rp 0</td><td></td></tr></tfoot>
</table>
<br><button class="btn btn-biru" onclick="location.href='index.html'">← Kembali</button>

<script>
// KUNCI NO 2: NAMA KEY HARUS SAMA PERSIS KAYAK DI INDEX
const KEY = 'cashflow_data_v1';
const rupiah = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');

function load() {
  const data = JSON.parse(localStorage.getItem(KEY) || '[]');
  console.log('Data dibaca detail:', data); // Cek di F12
  const tb = document.querySelector('#tbl tbody'); tb.innerHTML='';
  let s=0, masuk=0, keluar=0, hutang=0, pinjam=0;

  data.forEach((d,i)=>{
    s += (d.masuk||0) - (d.keluar||0) - (d.hutang||0) + (d.minjemin||0) - (d.dikembalikan||0) + (d.pengembalian||0);
    masuk += (d.masuk||0) + (d.pengembalian||0);
    keluar += (d.keluar||0) + (d.dikembalikan||0);
    hutang += d.hutang||0; pinjam += d.minjemin||0;
    tb.innerHTML += `<tr><td>${i+1}</td><td>${d.tanggal}</td><td>${d.item}</td><td>${d.nama}</td><td>${rupiah(d.minjemin)}</td><td>${rupiah(d.hutang)}</td><td>${rupiah(d.dikembalikan)}</td><td>${rupiah(d.pengembalian)}</td><td>${rupiah(d.masuk)}</td><td>${rupiah(d.keluar)}</td><td>${rupiah(s)}</td></tr>`;
  });

  document.getElementById('sAkhir').innerText = rupiah(s);
  document.getElementById('tMasuk').innerText = rupiah(masuk);
  document.getElementById('tKeluar').innerText = rupiah(keluar);
  document.getElementById('tHutang').innerText = rupiah(hutang);
  document.getElementById('tPinjam').innerText = rupiah(pinjam);
  document.getElementById('sHutang').innerText = rupiah(hutang-pinjam);
  document.getElementById('tTotal').innerText = rupiah(s);
}
function kosong(){ if(confirm('Hapus semua?')){ localStorage.removeItem(KEY); load(); } }
load();
</script>
</body>
</html>
