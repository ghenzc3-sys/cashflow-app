
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Input Cashflow V13.1</title>
<style>
:root{--biru:#2563eb;--biru-muda:#0ea5e9;--hijau:#10b981;--merah:#ef4444;--orange:#f97316;--abu:#f3f4f6}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:var(--abu);margin:0;padding:16px}
.box{background:#fff;border-radius:20px;padding:20px;max-width:500px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,.08)}
h1{font-size:20px;font-weight:900;color:var(--biru);margin:0 0 16px;text-align:center}
form{display:grid;gap:12px}
label{font-size:13px;font-weight:700;color:#374151}
input,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;font-size:15px}
input:focus,select:focus{outline:none;border-color:var(--biru);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{background:var(--biru);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:900;cursor:pointer}
.btn:hover{opacity:.9}
.link{text-align:center;margin-top:12px}
.link a{color:var(--biru);font-weight:700;text-decoration:none;font-size:14px}
.hint{font-size:12px;color:#6b7280;text-align:center;margin-top:-4px}
</style>
</head>
<body>
<div class="box">
  <h1>📝 Input Cashflow V13.1</h1>
  <form id="form">
    <div>
      <label>Tanggal</label>
      <input type="date" id="tgl" required>
    </div>
    <div>
      <label>Keterangan <span style="font-weight:400;color:#6b7280">[Opsional, Auto]</span></label>
      <select id="ket">
        <option value="">-- Auto Detect --</option>
        <option value="Masuk">Masuk</option>
        <option value="Keluar">Keluar</option>
      </select>
    </div>
    <div>
      <label>Catatan</label>
      <input type="text" id="cat" placeholder="Contoh: gaji, upah, beli cilok, dipinjam" required>
      <div class="hint">Ketik 'gaji/upah/dapat' = Masuk. 'beli/bayar/jajan' = Keluar</div>
    </div>
    <div>
      <label>Nama</label>
      <input type="text" id="nama" placeholder="Opsional">
    </div>
    <div>
      <label>Nominal</label>
      <input type="number" id="jml" placeholder="10000" required>
    </div>
    <button class="btn">Simpan</button>
  </form>
  <div class="link"><a href="/detail.html">Lihat Detail 📊</a></div>
</div>

<script>
const KEY='cashflow_v13';
const form=document.getElementById('form');
document.getElementById('tgl').valueAsDate=new Date();

const autoDetect=(cat)=>{
  const c=cat.toLowerCase();
  if(['gaji','upah','dapat','masuk','bonus'].some(k=>c.includes(k))) return 'Masuk';
  if(['beli','bayar','jajan','keluar','makan','rokok','kos','bensin'].some(k=>c.includes(k))) return 'Keluar';
  if(['dipinjam','nyaur'].some(k=>c.includes(k))) return 'Keluar';
  if(['hutang','kembali'].some(k=>c.includes(k))) return 'Masuk';
  return 'Keluar'; // default kalau gak ketemu = Keluar
}

form.onsubmit=e=>{
  e.preventDefault();
  const tgl=document.getElementById('tgl').value.split('-').reverse().join('/');
  const ketSelect=document.getElementById('ket').value;
  const cat=document.getElementById('cat').value.trim();
  const nama=document.getElementById('nama').value.trim();
  const jml=Number(document.getElementById('jml').value);
  
  const ket=ketSelect || autoDetect(cat); // Pake manual, kalau kosong pake auto

  const data=JSON.parse(localStorage.getItem(KEY)||'[]');
  data.push({t:tgl,ket,c:cat,n:nama,jml});
  localStorage.setItem(KEY,JSON.stringify(data));
  
  alert(`Tersimpan: ${ket} - ${cat} Rp ${jml.toLocaleString('id-ID')}`);
  form.reset();
  document.getElementById('tgl').valueAsDate=new Date();
}
</script>
</body>
</html>
