<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Cashflow</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f3f4f6;padding:16px}
 .card{background:#fff;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.1);padding:20px;max-width:800px;margin:0 auto}
  h1{margin:0 0 12px;font-size:20px;color:#2563eb}
  a{color:#2563eb;text-decoration:none;font-size:14px}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px}
  th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}
  th{color:#6b7280;font-weight:600}
 .right{text-align:right}
 .in{color:#16a34a;font-weight:700}
 .out{color:#dc2626;font-weight:700}
 .muted{color:#6b7280;text-align:center;padding:20px}
</style>
</head>
<body>
  <div class="card">
    <h1>Detail Transaksi</h1>
    <a href="index.html">← Kembali ke Input</a>
    <table id="tbl">
      <thead><tr><th>Tgl</th><th>Jenis</th><th>Catatan</th><th class="right">Jumlah</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="kosong" class="muted">Belum ada data. Input dulu di halaman utama.</div>
  </div>

<script>
const KEY = 'cashflow_app_final'; // <-- HARUS SAMA PERSIS DENGAN INDEX
const FMT = new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0});

let data = JSON.parse(localStorage.getItem(KEY)) || [];
console.log("DETAIL BACA:", data); // Buka F12 buat ngecek

const tbody = document.querySelector('#tbl tbody');

if(data.length===0){
  document.getElementById('kosong').style.display='block';
}else{
  document.getElementById('kosong').style.display='none';
  data.sort((a,b)=>b.tgl.localeCompare(a.tgl)).forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.tgl}</td>
      <td class="${r.jenis}">${r.jenis==='in'?'Masuk':'Keluar'}</td>
      <td>${r.catatan}</td>
      <td class="right ${r.jenis}">${r.jenis==='in'?'+':''}${FMT.format(r.jumlah)}</td>`;
    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
