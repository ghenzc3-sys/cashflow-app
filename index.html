<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cashflow</h1>
        
        <div class="input-box">
            <input type="text" id="desc" placeholder="Keterangan">
            <input type="number" id="amount" placeholder="Jumlah">
            <select id="type">
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
            </select>
            <button onclick="addData()">Tambah</button>
        </div>
        
        <h2 class="balance">Saldo: <span id="balance">Rp 0</span></h2>
        
        <table>
            <thead>
                <tr>
                    <th>Keterangan</th>
                    <th>Jenis</th>
                    <th>Jumlah</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
