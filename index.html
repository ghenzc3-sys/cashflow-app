
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cashflow AI</title>
<style>
:root{--biru:#2563eb;--biru-muda:#0ea5e9;--hijau:#10b981;--merah:#ef4444;--orange:#f97316;--ungu:#8b5cf6;--abu:#f3f4f6;--biru-soft:#dbeafe;--hijau-soft:#d1fae5;--merah-soft:#fee2e2;--orange-soft:#ffedd5;--ungu-soft:#ede9fe}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:var(--abu);margin:0;padding:16px;display:flex;justify-content:center}
.box{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:420px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.head span{font-size:28px}
.head h1{font-size:20px;font-weight:900;color:var(--biru);margin:0}
.card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:14px;margin-bottom:14px}
.card.l{font-size:12px;font-weight:800;color:#6b7280;margin-bottom:6px}
.card.v{font-size:20px;font-weight:900}
.v.biru{color:var(--biru);background:var(--biru-soft)}
.v.biru-muda{color:var(--biru-muda);background:var(--biru-soft)}
.v.hijau{color:var(--hijau);background:var(--hijau-soft)}
.v.merah{color:var(--merah);background:var(--merah-soft)}
.v.orange{color:var(--orange);background:var(--orange-soft)}
.v.ungu{color:var(--ungu);background:var(--ungu-soft)}
input{width:100%;padding:14px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;margin-bottom:12px;outline:none;transition:.2s}
input:focus{border-color:var(--biru);box-shadow:0 0 0 3px var(--biru-soft)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:800;background:var(--biru);color:#fff;cursor:pointer}
.btn:disabled{background:#d1d5db}
.info{font-size:12px;color:#6b7280;text-align:center;margin-top:8px}
.link{display:block;text-align:center;margin-top:12px;font-size:14px;font-weight:700;color:var(--biru);text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <div class="head"><span>💰</span><h1>Cashflow AI V12</h1></div>
  
  <div class="card"><div class="card l">Saldo Kas</div><div class="card v biru" id="kas">Rp 0</div></div>
  <div class="card"><div class="card l">Uang Harian</div><div class="card v ungu" id="harian">Rp 0</div></div>
  
  <input id="inp" placeholder="Contoh: gaji 500000 atau jajan 20000" autocomplete="off">
  <button class="btn" id="save">Simpan</button>
  <div class="info">Ketik: [ket] [nominal] [catatan] [nama]</div>
  <a href="/detail.html" class="link">Lihat Detail →</a>
</div>

<script>
const KEY='cashflow_v13'; // KEY TETEP SAMA BIAR DATA GAK ILANG
const rupiah=n=>'Rp '+Number(n||0).toLocaleString('id-ID');

const getData=()=>JSON.parse(localStorage.getItem(KEY)||'[]');
const saveData=d=>localStorage.setItem(KEY,JSON.stringify(d));

const renderCard=()=>{
  const d=getData();
  let totalMasuk=0,totalKeluar=0,piutang=0,utang=0;
  d.forEach(i=>{
    const cat=(i.c||'').toLowerCase().trim();
    if(i.ket==='Masuk'){
      totalMasuk+=i.jml;
      if(cat==='kembali')piutang-=i.jml;
      if(cat==='hutang')utang+=i.jml;
    }else{
      totalKeluar+=i.jml;
      if(cat==='dipinjam')piutang+=i.jml;
      if(cat==='nyaur')utang-=i.jml;
    }
  });
  const saldo=totalMasuk-totalKeluar;
  const now=new Date();
  const lastDay=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const sisaHari=Math.max(1,lastDay-now.getDate()+1);
  document.getElementById('kas').innerText=rupiah(saldo);
  document.getElementById('harian').innerText=rupiah(saldo/sisaHari);
}

// PARSER V12 YANG SIMPLE
const parse=(t)=>{
  t=t.toLowerCase().trim().replace(/\s+/g,' ');
  const m=t.match(/(\d[\d\.]*)/); if(!m)return null;
  const jml=Number(m[1].replace(/\./g,''));
  const ket=t.includes('gaji')||t.includes('masuk')||t.includes('dapat')?'Masuk':'Keluar';
  const c=t.split(m[1])[0].trim().replace(ket.toLowerCase(),'').trim();
  const n=t.split(m[1])[1]?.trim()||'';
  return{t:new Date().toLocaleDateString('id-ID'),ket,jml,c,n,id:Date.now()}; // ID BALIK KE DATE.NOW
}

document.getElementById('save').onclick=()=>{
  const v=document.getElementById('inp').value;
  const d=parse(v);
  if(!d){alert('Format salah. Contoh: jajan 20000');return}
  const all=getData(); all.push(d); saveData(all);
  document.getElementById('inp').value='';
  renderCard();
}
document.getElementById('inp').onkeydown=e=>{if(e.key==='Enter')document.getElementById('save').click()};

renderCard();
</script>
</body>
</html>
