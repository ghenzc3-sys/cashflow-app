<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow</title>
  <style>
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #e0f2fe, #f4f6f8); 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
 .box {
      background: white;
      padding: 40px 35px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      width: 420px;
      max-width: 95%;
      text-align: center;
    }
    h1 { 
      color: #1e40af; 
      font-size: 36px; 
      font-weight: 900; 
      margin: 0 0 12px 0; 
    }
 .emoji { font-size: 64px; margin-bottom: 15px; }
    label { 
      font-weight: bold; 
      color: #374151; 
      display: block; 
      margin: 20px 0 10px 0; 
      font-size: 16px;
    }
 .saldo-wrap { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
 .saldo-box {
      flex: 1;
      border: 2px solid #2563eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 20px;
      font-weight: 800;
      color: #2563eb;
      text-align: center;
      min-height: 28px;
    }
 .btn-icon {
      background: #2563eb;
      border: none;
      border-radius: 14px;
      width: 52px;
      height: 52px;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 .btn-icon:active { background: #1e40af; transform: scale(0.95); }
 .input-wrap { display: flex; gap: 10px; align-items: center; }
    #inputData { flex: 1; border: 2px solid #2563eb; border-radius: 14px; padding: 14px; font-size: 16px; }
 .btn-simpan { background: #2563eb; color: white; border: none; border-radius: 14px; padding: 14px 24px; font-weight: bold; cursor: pointer; font-size: 16px; }
 .keyword { font-size: 13px; color: #6b7280; margin: 8px 0 20px 0; }
 .btn-detail { background: #10b981; color: white; border: none; border-radius: 14px; padding: 14px 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cashflow</h1>
    <div class="emoji">😺</div>
    
    <label>Saldo</label>
    <div class="saldo-wrap">
      <div class="saldo-box" id="saldoText">Rp *******</div>
      <button class="btn-icon" id="btnMata" onclick="toggleSaldo()">👁️</button>
    </div>

    <div class="input-wrap">
      <input type="text" id="inputData" placeholder="Contoh: gaji 50000">
      <button class="btn-simpan" onclick="simpanData()">Simpan</button>
    </div>
    <div class="keyword">Keyword: gaji, upah, beli, bayar, hutang, minjemin, kembali</div>

    <button class="btn-detail" onclick="window.location.href='detail.html'">Detail</button>
  </div>

  <script>
    let showSaldo = false; // Default: ketutup

    function formatRupiah(num) {
      return 'Rp ' + Number(num || 0).toLocaleString('id-ID');
    }

    function hitungSaldo() {
      try {
        const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');
        console.log('Data di localStorage:', data); // Cek di F12 > Console
        let saldo = 0;
        data.forEach(d => {
          saldo += (Number(d.masuk) || 0) - (Number(d.keluar) || 0) - (Number(d.hutang) || 0) + (Number(d.minjemin) || 0) - (Number(d.dikembalikan) || 0) + (Number(d.pengembalian) || 0);
        });
        console.log('Total Saldo:', saldo);
        return saldo;
      } catch(e) {
        console.error('Error baca localStorage:', e);
        return 0;
      }
    }

    function updateSaldo() {
      const saldo = hitungSaldo();
      const saldoText = document.getElementById('saldoText');
      const btnMata = document.getElementById('btnMata');
      
      if (showSaldo) {
        saldoText.textContent = formatRupiah(saldo); // Buka
        btnMata.textContent = '🙈'; 
      } else {
        saldoText.textContent = 'Rp *******'; // Tutup
        btnMata.textContent = '👁️'; 
      }
    }

    function toggleSaldo() {
      showSaldo =!showSaldo; // Balik true/false
      console.log('Toggle mata:', showSaldo); // Cek di F12
      updateSaldo(); // Langsung update tampilan
    }

    function simpanData() {
      const text = document.getElementById('inputData').value.trim().toLowerCase();
      if (!text) return alert('Isi dulu bang');

      const angkaMatch = text.match(/(\d[\d\.]*)/);
      const nominal = angkaMatch? Number(angkaMatch[1].replace(/\./g, '')) : 0;
      if (nominal <= 0) return alert('Harus ada nominal. Contoh: gaji 50000');

      let jenis = 'masuk';
      if (text.includes('beli') || text.includes('bayar') || text.includes('keluar')) jenis = 'keluar';
      else if (text.includes('hutang')) jenis = 'hutang';
      else if (text.includes('minjemin') || text.includes('pinjemin')) jenis = 'minjemin';
      else if (text.includes('kembali')) jenis = text.includes('dikembali')? 'dikembalikan' : 'pengembalian';
      else if (text.includes('gaji') || text.includes('upah')) jenis = 'masuk';

      const item = text.replace(/[\d\.]+/g, '').trim();
      const data = JSON.parse(localStorage.getItem('cashflowData') || '[]');

      data.push({
        tanggal: new Date().toISOString().split('T')[0],
        item: item || jenis,
        nama: '-',
        masuk: jenis === 'masuk' || jenis === 'pengembalian'? nominal : 0,
        keluar: jenis === 'keluar' || jenis === 'dikembalikan'? nominal : 0,
        hutang: jenis === 'hutang'? nominal : 0,
        minjemin: jenis === 'minjemin'? nominal : 0,
        dikembalikan: jenis === 'dikembalikan'? nominal : 0,
        pengembalian: jenis === 'pengembalian'? nominal : 0
      });

      localStorage.setItem('cashflowData', JSON.stringify(data));
      document.getElementById('inputData').value = '';
      
      // Kalo lagi mode buka, langsung update angkanya
      if(showSaldo) updateSaldo(); 
      
      alert('Tersimpan: ' + item + ' + formatRupiah(nominal)); // UDAH FIX TANDA '
    }

    document.getElementById('inputData').addEventListener('keypress', e => {
      if (e.key === 'Enter') simpanData();
    });

    // Jalankan pas buka halaman
    updateSaldo();
  </script>
</body>
</html>
